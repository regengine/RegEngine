apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: regengine-prod

resources:
  - namespace.yaml
  - ../../base

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: regengine
    app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: compliance-config
    literals:
      - REGENGINE_ENV=production
      - ENVIRONMENT=production
      - PORT=8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
  - name: ingestion-config
    literals:
      - REGENGINE_ENV=production
      - ENVIRONMENT=production
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - NEO4J_URI=bolt+s://neo4j:7687
      - NEO4J_USER=neo4j
      - ENABLE_NEO4J_SYNC=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
  - name: graph-config
    literals:
      - REGENGINE_ENV=production
      - ENVIRONMENT=production
      - PORT=8200
      - REDIS_URL=redis://redis:6379/2
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_TOPIC_NLP=nlp.extracted
      - KAFKA_TOPIC_DLQ=fsma.events.dlq
      - KAFKA_CONSUMER_GROUP_ID=fsma-graph-service
      - NEO4J_URI=bolt+s://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_ENCRYPTED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
  - name: nlp-config
    literals:
      - REGENGINE_ENV=production
      - ENVIRONMENT=production
      - PORT=8100
      - EVENT_BACKBONE=kafka
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - LLM_MODEL=gpt-4o-mini
      - LLM_TIMEOUT_S=45
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317

secretGenerator:
  - name: admin-secrets
    literals:
      - DATABASE_URL=replace-with-production-database-url
      - REDIS_URL=replace-with-production-redis-url
      - AUTH_SECRET_KEY=replace-with-production-auth-secret
      - REGENGINE_API_KEY=replace-with-production-api-key
      - ADMIN_MASTER_KEY=replace-with-production-admin-master-key
      - METRICS_API_KEY=replace-with-production-metrics-key
  - name: compliance-secrets
    literals:
      - DATABASE_URL=replace-with-production-database-url
      - AUTH_SECRET_KEY=replace-with-production-auth-secret
      - REGENGINE_API_KEY=replace-with-production-api-key
      - METRICS_API_KEY=replace-with-production-metrics-key
  - name: ingestion-secrets
    literals:
      - DATABASE_URL=replace-with-production-database-url
      - AUTH_SECRET_KEY=replace-with-production-auth-secret
      - REGENGINE_API_KEY=replace-with-production-api-key
      - REGENGINE_INTERNAL_SECRET=replace-with-production-internal-secret
      - METRICS_API_KEY=replace-with-production-metrics-key
  - name: scheduler-secrets
    literals:
      - DATABASE_URL=replace-with-production-database-url
      - REDIS_URL=replace-with-production-redis-url
      - REGENGINE_INTERNAL_SECRET=replace-with-production-internal-secret
      - METRICS_API_KEY=replace-with-production-metrics-key
  - name: graph-secrets
    literals:
      - DATABASE_URL=replace-with-production-database-url
      - REDIS_URL=replace-with-production-redis-url
      - NEO4J_PASSWORD=replace-with-production-neo4j-password
      - AUTH_SECRET_KEY=replace-with-production-auth-secret
      - REGENGINE_API_KEY=replace-with-production-api-key
      - METRICS_API_KEY=replace-with-production-metrics-key
  - name: nlp-secrets
    literals:
      - DATABASE_URL=replace-with-production-database-url
      - OPENAI_API_KEY=replace-with-production-openai-key
      - AUTH_SECRET_KEY=replace-with-production-auth-secret
      - REGENGINE_API_KEY=replace-with-production-api-key
      - METRICS_API_KEY=replace-with-production-metrics-key

# IMAGE_TAG is set by CI/CD (e.g. the git SHA or semver tag).
# All base deployments use $(IMAGE_TAG) as a placeholder; kustomize
# rewrites them to the concrete ghcr.io image + tag at deploy time.
images:
  - name: regengine/compliance-service
    newName: ghcr.io/regengine/compliance
    newTag: v1.1.0
  - name: regengine/admin-service
    newName: ghcr.io/regengine/admin
    newTag: v1.1.0
  - name: regengine/ingestion-service
    newName: ghcr.io/regengine/ingestion
    newTag: v1.1.0
  - name: regengine/scheduler
    newName: ghcr.io/regengine/scheduler
    newTag: v1.1.0
  - name: regengine/graph-service
    newName: ghcr.io/regengine/graph
    newTag: v1.1.0
  - name: regengine/nlp-service
    newName: ghcr.io/regengine/nlp
    newTag: v1.1.0

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: compliance-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: compliance-service
      spec:
        replicas: 5
