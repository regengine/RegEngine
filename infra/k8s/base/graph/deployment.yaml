apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-service
  labels:
    app: graph
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graph
  template:
    metadata:
      labels:
        app: graph
    spec:
      containers:
      - name: graph
        image: regengine/graph-service:$(IMAGE_TAG)
        ports:
        - containerPort: 8200
        envFrom:
        - configMapRef:
            name: graph-config
        - secretRef:
            name: graph-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: graph-service
spec:
  selector:
    app: graph
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8200
  type: ClusterIP
