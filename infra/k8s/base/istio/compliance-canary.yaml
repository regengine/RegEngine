apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: compliance-canary
spec:
  hosts:
  - compliance-service
  http:
  - route:
    - destination:
        host: compliance-service
        subset: v1
      weight: 90
    - destination:
        host: compliance-service
        subset: v2
      weight: 10
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: compliance-destination
spec:
  host: compliance-service
  subsets:
  - name: v1
    labels:
      version: v1.1.0
  - name: v2
    labels:
      version: v1.2.0-canary
