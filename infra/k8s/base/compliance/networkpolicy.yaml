apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: compliance-service
  labels:
    app: compliance
spec:
  podSelector:
    matchLabels:
      app: compliance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - podSelector:
            matchLabels:
              app: admin
        - podSelector:
            matchLabels:
              app: scheduler
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    - to: []
      ports:
        - protocol: TCP
          port: 6379
    - to: []
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9644
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
