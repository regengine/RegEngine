apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-service
  labels:
    app: compliance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliance
  template:
    metadata:
      labels:
        app: compliance
    spec:
      containers:
      - name: compliance
        image: regengine/compliance-service:$(IMAGE_TAG)
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: compliance-config
        - secretRef:
            name: compliance-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-service
spec:
  selector:
    app: compliance
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
