apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nlp-service
  labels:
    app: nlp
spec:
  podSelector:
    matchLabels:
      app: nlp
  policyTypes:
    - Ingress
    - Egress

  # Allow ingress only from the NGINX ingress controller and the ingestion service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - podSelector:
            matchLabels:
              app: ingestion
      ports:
        - protocol: TCP
          port: 8100

  # Allow egress to PostgreSQL, Redis, Kafka, and external HTTPS
  egress:
    # PostgreSQL
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to: []
      ports:
        - protocol: TCP
          port: 6379
    # Kafka / Redpanda
    - to: []
      ports:
        - protocol: TCP
          port: 9092  # Kafka
        - protocol: TCP
          port: 9644  # Redpanda admin
    # External HTTPS (webhooks, third-party APIs)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # DNS resolution (required for service discovery)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
