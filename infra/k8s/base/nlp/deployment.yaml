apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  labels:
    app: nlp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nlp
  template:
    metadata:
      labels:
        app: nlp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: nlp
        image: regengine/nlp-service:$(IMAGE_TAG)
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8100
        envFrom:
        - configMapRef:
            name: nlp-config
        - secretRef:
            name: nlp-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8100
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8100
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nlp-service
spec:
  selector:
    app: nlp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8100
  type: ClusterIP
