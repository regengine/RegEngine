apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingestion-service
  labels:
    app: ingestion
spec:
  podSelector:
    matchLabels:
      app: ingestion
  policyTypes:
    - Ingress
    - Egress

  # Allow ingress only from the NGINX ingress controller and the admin service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - podSelector:
            matchLabels:
              app: admin
      ports:
        - protocol: TCP
          port: 8000

  # Allow egress to PostgreSQL, Redis, Kafka, Neo4j, and external HTTPS
  egress:
    # PostgreSQL
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to: []
      ports:
        - protocol: TCP
          port: 6379
    # Kafka / Redpanda
    - to: []
      ports:
        - protocol: TCP
          port: 9092  # Kafka
        - protocol: TCP
          port: 9644  # Redpanda admin
    # Neo4j
    - to: []
      ports:
        - protocol: TCP
          port: 7687  # Neo4j Bolt
        - protocol: TCP
          port: 7474  # Neo4j HTTP
    # External HTTPS (webhooks, third-party APIs)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # DNS resolution (required for service discovery)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
