apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: partner-gateway
  namespace: regengine-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
  - host: partners.regengine.live
    http:
      paths:
      - path: /partner/v1
        pathType: Prefix
        backend:
          service:
            name: admin-service
            port:
              number: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: partner-branding
  namespace: regengine-prod
data:
  DELOITTE_THEME: "green-glass"
  PWC_THEME: "orange-glass"
  EY_THEME: "yellow-glass"
