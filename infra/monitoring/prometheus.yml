global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'regengine-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
        - 'compliance-service:80'
        - 'admin-service:80'
        - 'ingestion-service:80'
        - 'scheduler:80'
  
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
