groups:
  - name: regengine_critical_alerts
    interval: 30s
    rules:
      # Service Health Alerts
      - alert: ServiceDown
        expr: up{job="regengine"} == 0
        for: 1m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "RegEngine service {{ $labels.instance }} is down"
          description: "Service {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{job="regengine", status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High 5xx error rate on {{ $labels.endpoint }}"
          description: "Error rate is {{ $value | humanizePercentage }} on endpoint {{ $labels.endpoint }}."

      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="regengine"}[5m])) > 0.5
        for: 10m
        labels:
          severity: critical
          component: performance
        annotations:
          summary: "High P99 latency on {{ $labels.endpoint }}"
          description: "P99 latency is {{ $value | humanizeDuration }} on endpoint {{ $labels.endpoint }} (threshold: 500ms)."

      # Kafka Alerts
      - alert: HighKafkaConsumerLag
        expr: kafka_consumergroup_lag > 10000
        for: 5m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "High Kafka consumer lag on topic {{ $labels.topic }}"
          description: "Consumer lag is {{ $value }} messages on topic {{ $labels.topic }}, consumer group {{ $labels.consumergroup }}."

      - alert: KafkaConsumerNotConsuming
        expr: rate(kafka_consumergroup_current_offset[5m]) == 0 and kafka_consumergroup_lag > 0
        for: 10m
        labels:
          severity: critical
          component: kafka
        annotations:
          summary: "Kafka consumer {{ $labels.consumergroup }} not consuming from {{ $labels.topic }}"
          description: "Consumer group {{ $labels.consumergroup }} has stopped consuming from topic {{ $labels.topic }} with lag {{ $value }}."

      # Database Resource Alerts
      - alert: HighCPUUtilization
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanizePercentage }} on {{ $labels.instance }} (threshold: 90%)."

      - alert: HighMemoryUtilization
        expr: 100 * (1 - ((node_memory_MemAvailable_bytes) / (node_memory_MemTotal_bytes))) > 90
        for: 10m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }} (threshold: 90%)."

      - alert: LowDiskSpace
        expr: 100 - ((node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes) > 85
        for: 5m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}:{{ $labels.mountpoint }} (threshold: 85%)."

      - alert: CriticalDiskSpace
        expr: 100 - ((node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes) > 95
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "CRITICAL: Disk almost full on {{ $labels.instance }}"
          description: "Disk usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}:{{ $labels.mountpoint }} (threshold: 95%). Immediate action required."

      # PostgreSQL Alerts
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been unreachable for more than 1 minute."

      - alert: PostgreSQLTooManyConnections
        expr: pg_stat_database_numbackends > (pg_settings_max_connections * 0.9)
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL approaching max connections"
          description: "PostgreSQL has {{ $value }} active connections, approaching max of {{ pg_settings_max_connections }}."

  - name: regengine_warning_alerts
    interval: 30s
    rules:
      - alert: ModerateKafkaLag
        expr: kafka_consumergroup_lag > 1000 and kafka_consumergroup_lag <= 10000
        for: 10m
        labels:
          severity: warning
          component: kafka
        annotations:
          summary: "Moderate Kafka consumer lag on {{ $labels.topic }}"
          description: "Consumer lag is {{ $value }} messages on topic {{ $labels.topic }}."

      - alert: IncreasedErrorRate
        expr: rate(http_requests_total{job="regengine", status=~"5.."}[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Increased error rate on {{ $labels.endpoint }}"
          description: "Error rate is {{ $value | humanizePercentage }} on endpoint {{ $labels.endpoint }}."

      - alert: ModerateP99Latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="regengine"}[5m])) > 0.2
        for: 15m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Elevated P99 latency on {{ $labels.endpoint }}"
          description: "P99 latency is {{ $value | humanizeDuration }} on endpoint {{ $labels.endpoint }} (threshold: 200ms)."

      - alert: HighDiskIOWait
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High disk I/O wait time on {{ $labels.instance }}"
          description: "Disk I/O wait time is elevated on {{ $labels.instance }}."

      - alert: PostgreSQLHighConnections
        expr: pg_stat_database_numbackends > (pg_settings_max_connections * 0.7)
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections (70% of max)."

      - alert: PostgreSQLDeadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "PostgreSQL is experiencing deadlocks at rate {{ $value }} per second."
