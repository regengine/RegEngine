events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # =========================================================================
    # LOGGING CONFIGURATION
    # =========================================================================
    
    # JSON structured logging for audit trail
    log_format json_audit escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"request_id":"$request_id",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_x_request_id":"$http_x_request_id",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status"'
    '}';

    access_log /var/log/nginx/access.log json_audit;
    error_log /var/log/nginx/error.log warn;

    # =========================================================================
    # SECURITY HEADERS (Applied globally)
    # =========================================================================
    
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # HSTS - Enable in production with valid SSL
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # =========================================================================
    # RATE LIMITING ZONES
    # =========================================================================
    
    # General API rate limiting (10 requests/second per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # FSMA endpoints may need higher limits during recall events
    limit_req_zone $binary_remote_addr zone=fsma_limit:10m rate=20r/s;
    
    # Strict limit for authentication endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # =========================================================================
    # UPSTREAM DEFINITIONS
    # =========================================================================

    upstream admin_service {
        server admin-api:8400;
        keepalive 32;
    }

    upstream ingestion_service {
        server ingestion-service:8000;
        keepalive 32;
    }

    upstream nlp_service {
        server nlp-service:8100;
        keepalive 16;
    }

    upstream graph_service {
        server graph-service:8200;
        keepalive 64;  # Higher for trace queries
    }

    upstream compliance_service {
        server compliance-service:8500;
        keepalive 16;
    }

    # =========================================================================
    # MAIN SERVER BLOCK
    # =========================================================================

    server {
        listen 80;
        server_name localhost;

        # Request ID for correlation (use client's if provided)
        set $request_id $http_x_request_id;
        if ($request_id = "") {
            set $request_id $request_id;
        }

        # =====================================================================
        # CORS Configuration
        # =====================================================================
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-RegEngine-API-Key, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            return 204;
        }

        # =====================================================================
        # ADMIN SERVICE (/admin/)
        # =====================================================================
        
        location /admin/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://admin_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-RegEngine-Tenant-ID "";
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # =====================================================================
        # INGESTION SERVICE (/ingest/)
        # =====================================================================
        
        location /ingest/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://ingestion_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-RegEngine-Tenant-ID "";
            proxy_set_header Connection "";
            
            # Large file uploads for PDF/documents
            client_max_body_size 100M;
            
            # Longer timeouts for document processing
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # =====================================================================
        # NLP SERVICE (/nlp/)
        # =====================================================================
        
        location /nlp/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://nlp_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-RegEngine-Tenant-ID "";
            proxy_set_header Connection "";
            
            # NLP extraction can take time
            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        # =====================================================================
        # GRAPH SERVICE (/graph/)
        # =====================================================================
        
        location /graph/ {
            limit_req zone=api_limit burst=30 nodelay;
            
            proxy_pass http://graph_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-RegEngine-Tenant-ID "";
            proxy_set_header Connection "";
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # FSMA 204 ROUTES (/fsma/) - Direct access to FSMA endpoints
        # =====================================================================
        
        location /fsma/ {
            # Higher rate limit for recall scenarios
            limit_req zone=fsma_limit burst=50 nodelay;
            
            # Route to graph service which hosts FSMA endpoints
            proxy_pass http://graph_service/v1/fsma/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-RegEngine-Tenant-ID "";
            proxy_set_header Connection "";
            
            # FSMA trace queries should be fast (24-hour mandate)
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # CORS for FSMA endpoints
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }

        # =====================================================================
        # FSMA TRACE SHORTCUTS (Convenience routes)
        # =====================================================================
        
        # Forward trace: /trace/forward/{tlc}
        location ~ ^/trace/forward/(.+)$ {
            limit_req zone=fsma_limit burst=50 nodelay;
            
            proxy_pass http://graph_service/v1/fsma/trace/forward/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Backward trace: /trace/backward/{tlc}
        location ~ ^/trace/backward/(.+)$ {
            limit_req zone=fsma_limit burst=50 nodelay;
            
            proxy_pass http://graph_service/v1/fsma/trace/backward/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # =====================================================================
        # COMPLIANCE SERVICE (/compliance/)
        # =====================================================================
        
        location /compliance/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://compliance_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-RegEngine-Tenant-ID "";
            proxy_set_header Connection "";
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =====================================================================
        # HEALTH CHECK ENDPOINTS
        # =====================================================================
        
        # Gateway health
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"gateway","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # Aggregate health check (checks all upstreams)
        location /health/all {
            access_log off;
            default_type application/json;
            
            content_by_lua_block {
                -- Note: Requires lua-nginx-module
                -- For now, return static response
                ngx.say('{"status":"ok","services":["gateway","admin","ingestion","nlp","graph","compliance"]}')
            }
        }

        # Readiness probe for Kubernetes
        location /ready {
            access_log off;
            return 200 '{"ready":true}';
            add_header Content-Type application/json;
        }

        # Liveness probe for Kubernetes
        location /live {
            access_log off;
            return 200 '{"alive":true}';
            add_header Content-Type application/json;
        }

        # =====================================================================
        # METRICS ENDPOINT (Prometheus)
        # =====================================================================
        
        location /metrics {
            # Restrict to internal/monitoring IPs in production
            # allow 10.0.0.0/8;
            # deny all;
            
            stub_status on;
            access_log off;
        }

        # =====================================================================
        # ERROR PAGES
        # =====================================================================
        
        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 500 '{"error":"Internal Server Error","status":500,"message":"The server encountered an unexpected condition"}';
        }

        error_page 404 /404.json;
        location = /404.json {
            internal;
            default_type application/json;
            return 404 '{"error":"Not Found","status":404,"message":"The requested resource was not found"}';
        }

        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","status":429,"message":"Rate limit exceeded. Please retry after a moment."}';
        }
    }

    # =========================================================================
    # HTTPS SERVER (Enable when SSL certificates are available)
    # =========================================================================
    
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # Enable HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     # Include all location blocks from HTTP server above
    # }
}
