# Minimal dev stack — just Postgres. Run backend services locally.
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Production uses Supabase (Postgres 17). This provides a local Postgres
# for running tests and backend services without a Supabase project.
#
# Legacy infrastructure is intentionally not part of the default dev stack.

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: regengine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: regengine
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U regengine" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
