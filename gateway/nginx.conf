events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    # admin: 5 req/sec per IP (tight limit for admin operations)
    # api: 10 req/sec per IP (reasonable limit for ingestion)
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    client_max_body_size 12M;

    # --- Upstream Definitions ---
    upstream admin_api {
        server admin-api:8400;
    }
    upstream ingestion_api {
        server ingestion-service:8000;
    }
    upstream graph_api {
        server graph-service:8200;
    }
    upstream nlp_api {
        server nlp-service:8100;
    }
    upstream compliance_api {
        server compliance-api:8500;
    }

    server {
        listen 80;

        # Shared proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SECURITY: Strip tenant ID header from external traffic
        proxy_set_header X-RegEngine-Tenant-ID "";

        # --- Admin ---
        location /v1/admin {
            limit_req zone=admin_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://admin_api;
        }
        location /overlay {
            limit_req zone=admin_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://admin_api;
        }

        # --- Ingestion ---
        location /v1/ingest {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://ingestion_api;
        }
        location /v1/scrape {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://ingestion_api;
        }
        location /v1/audit {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://ingestion_api;
        }
        location /v1/verify {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://ingestion_api;
        }

        # --- Graph ---
        location /api/v1/regulations {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://graph_api;
        }
        location /api/v1/labels {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://graph_api;
        }
        location /api/v1/lineage {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://graph_api;
        }
        location /api/v1/fsma {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://graph_api;
        }

        # --- NLP ---
        location /api/v1/nlp {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://nlp_api;
        }

        # --- Compliance ---
        location /industries {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }
        location /checklists {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }
        location /validate {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }
        location /v1/fsma {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }

        # --- Gateway Health ---
        location /health {
            return 200 'OK';
        }
    }
}
