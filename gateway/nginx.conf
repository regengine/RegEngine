events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    # admin: 5 req/sec per IP (tight limit for admin operations)
    # api: 10 req/sec per IP (reasonable limit for ingestion/compliance/graph)
    # NOTE: Backend middleware also applies per-tenant rate limiting at 100 rpm.
    # These nginx limits are per-IP and act as DDoS protection; middleware limits
    # are per-tenant and enforce fair usage. Both layers are intentional (M2).
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    client_max_body_size 512M;

    # Upstream service definitions
    upstream admin_api {
        server admin-api:8400;
    }

    upstream ingestion_api {
        server ingestion-service:8002;
    }

    upstream compliance_api {
        server compliance-api:8500;
    }

    upstream graph_api {
        server graph-api:8300;
    }

    server {
        listen 80;

        # SECURITY: Strip tenant ID header from all external traffic
        proxy_set_header X-RegEngine-Tenant-ID "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Admin API — strictest rate limit
        location /v1/admin {
            limit_req zone=admin_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://admin_api;
        }

        # Ingestion API — data intake, products, team, alerts, billing, audit log
        location /api/v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://ingestion_api;
        }

        # Compliance API — checklists, FSMA validation, scoring
        location /v1/compliance/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }

        location /checklists {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }

        location /industries {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }

        location /validate {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://compliance_api;
        }

        # Graph API — Neo4j traceability, traces, recall drills, drift alerts
        location /v1/fsma/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://graph_api;
        }

        location /v1/graph/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://graph_api;
        }

        # Health check (gateway-level)
        location /health {
            return 200 'OK';
        }
    }
}
