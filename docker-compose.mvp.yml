# docker-compose.mvp.yml
# Minimal stack for FSMA 204 E2E Demo: Ingest -> Normalize -> Evaluate -> Export
# Bypasses Kafka, Neo4j, and NLP — focuses on high-integrity persistence
# and 24-hour FDA export speed.
#
# Usage:
#   cp .env.example .env  # set ADMIN_MASTER_KEY, REGENGINE_API_KEY
#   docker compose -f docker-compose.mvp.yml up -d
#   alembic upgrade head
#   ./scripts/demo_mvp_flow.sh $REGENGINE_API_KEY

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: regengine
      POSTGRES_USER: regengine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regengine}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  admin-api:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    ports:
      - "8400:8400"
    environment:
      - DATABASE_URL=postgresql://regengine:regengine@postgres:5432/regengine
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_MASTER_KEY=${ADMIN_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8400

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://regengine:regengine@postgres:5432/regengine
      - REDIS_URL=redis://redis:6379/0
      - REGENGINE_API_KEY=${REGENGINE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8002
