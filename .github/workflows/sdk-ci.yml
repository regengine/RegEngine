name: SDK CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'regengine/**'
      - 'tests/sdk/**'
      - '.github/workflows/sdk-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'regengine/**'
      - 'tests/sdk/**'
      - '.github/workflows/sdk-ci.yml'

permissions:
  contents: read

jobs:
  sdk-clean-install:
    name: SDK clean install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install SDK in clean environment
        run: |
          python3 -m venv .venv-sdk
          . .venv-sdk/bin/activate
          python -m pip install --upgrade pip
          python -m pip install ./regengine

      - name: Verify import and client construction
        run: |
          . .venv-sdk/bin/activate
          python -c "import regengine; regengine.RegEngineClient(api_key='rge_x')"

      - name: Run SDK regression tests
        run: |
          python -m pip install pytest pytest-asyncio httpx requests
          python -m pytest tests/sdk -q
