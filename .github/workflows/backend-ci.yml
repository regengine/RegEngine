name: Backend Services CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'plugins/fsma/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Test Matrix ──────────────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin
          - compliance
          - graph
          - ingestion
          - nlp
          - scheduler

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5.24-community
        env:
          NEO4J_AUTH: neo4j/test-password-for-ci
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      localstack:
        image: localstack/localstack:3
        env:
          SERVICES: s3
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create additional databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE regengine_admin;"
          psql -h localhost -U postgres -c "CREATE DATABASE energy;"
          psql -h localhost -U postgres -c "CREATE DATABASE test_db;"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements.txt', matrix.service)) }}
          restore-keys: |
            pip-${{ matrix.service }}-
            pip-

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          COMPLIANCE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/regengine_admin
          ENTERTAINMENT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/regengine_admin
          ENERGY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/energy
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-key-for-ci
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test-password-for-ci
          ADMIN_MASTER_KEY: test-master-key-for-ci
          OBJECT_STORAGE_ACCESS_KEY_ID: ci-test-key
          OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-test-secret
          OBJECT_STORAGE_ENDPOINT_URL: http://localhost:4566
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          export PYTHONPATH=$(pwd):$PYTHONPATH
          cd services/${{ matrix.service }}
          pytest tests/ -v --cov=app --cov-report=term \
            --cov-report=xml:coverage.xml \
            --ignore=tests/integration/ \
            -o "testpaths=tests"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 14
          if-no-files-found: ignore

  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: Lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        service: [admin, compliance, graph, ingestion, nlp, scheduler]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run linting
        run: |
          pip install flake8
          cd services/${{ matrix.service }}
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503,E501,E302,E303,E305,E402,E128,E122,E114,E117,E261,E701,E702 --count --statistics

  # ── Docker Build ─────────────────────────────────────────
  docker-build:
    name: Docker Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # context is repo root so Dockerfiles can COPY shared/, kernel/, plugins/, etc.
        service: [admin, compliance, graph, ingestion, nlp, scheduler]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        # Use repo root as build context so absolute COPY paths resolve correctly.
        # All non-scheduler Dockerfiles reference shared/, services/<svc>/, kernel/, etc.
        run: |
          docker build -t regengine-${{ matrix.service }}:test \
            -f services/${{ matrix.service }}/Dockerfile .

      - name: Verify image starts
        run: |
          docker run --rm regengine-${{ matrix.service }}:test \
            python -c "print('Build OK')"
        continue-on-error: true

  # ── CI Summary ───────────────────────────────────────────
  ci-status:
    name: CI Status Gate
    if: always()
    needs: [test, lint, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Test:   ${{ needs.test.result }}"
          echo "Lint:   ${{ needs.lint.result }}"
          echo "Docker: ${{ needs.docker-build.result }}"
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::Test suite failed"
            exit 1
          fi
          echo "✅ All checks passed"
