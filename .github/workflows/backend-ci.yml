name: Backend Services CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Test Matrix ──────────────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin
          - automotive
          - compliance
          - energy
          - gaming
          - graph
          - ingestion
          - nlp
          - opportunity
          - scheduler

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements.txt', matrix.service)) }}
          restore-keys: |
            pip-${{ matrix.service }}-
            pip-

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-key-for-ci
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: test-password-for-ci
          ADMIN_MASTER_KEY: test-master-key-for-ci
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          cd services/${{ matrix.service }}
          pytest tests/ -v --cov=app --cov-report=term \
            --cov-report=xml:coverage.xml \
            --ignore=tests/integration/ \
            -o "testpaths=tests" \
            || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 14
          if-no-files-found: ignore

  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: Lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        service: [admin, energy, graph, ingestion, nlp]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run linting
        run: |
          pip install flake8
          cd services/${{ matrix.service }}
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503,E501 --count --statistics
        continue-on-error: true

  # ── Docker Build ─────────────────────────────────────────
  docker-build:
    name: Docker Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [admin, energy, ingestion, opportunity, graph, nlp]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t regengine-${{ matrix.service }}:test \
            -f services/${{ matrix.service }}/Dockerfile .

      - name: Verify image starts
        run: |
          docker run --rm regengine-${{ matrix.service }}:test \
            python -c "print('Build OK')"
        continue-on-error: true

  # ── CI Summary ───────────────────────────────────────────
  ci-status:
    name: CI Status Gate
    if: always()
    needs: [test, lint, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Test:   ${{ needs.test.result }}"
          echo "Lint:   ${{ needs.lint.result }}"
          echo "Docker: ${{ needs.docker-build.result }}"
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::Test suite failed"
            exit 1
          fi
          echo "✅ All checks passed"
