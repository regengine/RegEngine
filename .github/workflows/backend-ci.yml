name: Backend Services CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'plugins/fsma/**'
      - 'requirements.in'
      - 'requirements.lock'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'requirements.in'
      - 'requirements.lock'
      - '.github/workflows/backend-ci.yml'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Test Matrix ──────────────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin
          - compliance
          - graph
          - ingestion
          - nlp
          - scheduler

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5.24-community
        env:
          NEO4J_AUTH: neo4j/test-password-for-ci
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      localstack:
        image: localstack/localstack:3
        env:
          SERVICES: s3
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create additional databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE regengine_admin;"
          psql -h localhost -U postgres -c "CREATE DATABASE test_db;"

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pip
          # Key off the root requirements.lock — the single source of truth.
          # Per-service requirements.txt files are DEPRECATED (see #1429)
          # and match root, so caching on root invalidates correctly.
          key: pip-${{ hashFiles('requirements.lock') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          # Install from the root requirements.lock (pip-compile output; see
          # requirements.in for the human-edited top-level spec). --require-hashes
          # guarantees reproducible builds and rejects CVE-shifted artifacts.
          # Per-service stubs are DEPRECATED and will be removed with
          # docker-compose (#1429).
          pip install --require-hashes -r requirements.lock
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          COMPLIANCE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/regengine_admin
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-key-for-ci
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test-password-for-ci
          ADMIN_MASTER_KEY: test-master-key-for-ci
          OBJECT_STORAGE_ACCESS_KEY_ID: ci-test-key
          OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-test-secret
          OBJECT_STORAGE_ENDPOINT_URL: http://localhost:4566
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          export PYTHONPATH=$(pwd):$PYTHONPATH
          cd services/${{ matrix.service }}
          # Per-service coverage thresholds — ratcheted up 2026-04-20 (#1348).
          # Actual coverage measured 2026-04-20; thresholds set at (actual - 5%)
          # to give a meaningful floor without immediately breaking CI.
          # compliance: actual 85% → floor 80%
          # scheduler:  actual 69% → floor 65%
          # admin:      actual 75% → floor 70%
          # graph:      actual 64% → floor 60%
          # nlp:        actual 68% → floor 65%
          # ingestion:  actual ~50% on CI (collect errors block local run) → floor 48%
          THRESHOLD=60
          case "${{ matrix.service }}" in
            compliance) THRESHOLD=80 ;;  # was 30; actual 85%
            scheduler)  THRESHOLD=65 ;;  # was 35; actual 69%
            admin)      THRESHOLD=70 ;;  # was 50; actual 75%
            graph)      THRESHOLD=60 ;;  # was 50; actual 64%
            ingestion)  THRESHOLD=48 ;;  # was 42; actual ~50% on CI
            nlp)        THRESHOLD=65 ;;  # was 50; actual 68%
          esac
          # NOTE: --ignore=tests/integration/ is intentionally removed so that
          # integration tests contribute to the coverage report when they run.
          # Tests that require live external services should be marked with
          # @pytest.mark.integration and can be skipped via -m "not integration"
          # in environments without those services.
          pytest tests/ -v --cov=app --cov-report=term \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=$THRESHOLD \
            -o "testpaths=tests"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 14
          if-no-files-found: ignore

  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: Lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        service: [admin, compliance, graph, ingestion, nlp, scheduler]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run linting
        # F821 (undefined name) is now load-bearing — it caught the runtime
        # NameError bugs that were hidden in services/nlp/app/extractors/
        # llm_extractor.py for months before PR #1482 fixed them. Scope
        # expanded from ``app/`` only to the whole service directory so
        # ``main.py`` / ``api.py`` / ``conftest.py`` at service root are
        # also covered, plus this job now gates merges (see ci-status).
        run: |
          pip install flake8
          cd services/${{ matrix.service }}
          flake8 . --max-line-length=120 --select=E9,F63,F7,F82 \
            --exclude=__pycache__,.venv,venv,build,dist \
            --count --statistics

  # ── Lint shared/ ─────────────────────────────────────────
  # ``services/shared/`` isn't in the service matrix but is imported by
  # every service. F821 regressions there silently break downstream
  # callers at runtime — lint it explicitly.
  lint-shared:
    name: Lint shared/
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run linting
        run: |
          pip install flake8
          cd services/shared
          flake8 . --max-line-length=120 --select=E9,F63,F7,F82 \
            --exclude=__pycache__,.venv,venv,build,dist \
            --count --statistics

  # ── RLS fallback-UUID guard (hard gate) ──────────────────
  # Scans migrations for the fail-open RLS pattern that #1091 fixed.
  # Any new migration that reintroduces `COALESCE(..., <fallback-UUID>)`
  # or `COALESCE(current_setting(...), tenant_id)` will fail CI.
  rls-fallback-check:
    name: RLS fail-open migration guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for fail-open RLS fallbacks in migrations
        run: python scripts/check_rls_fallback.py

  # ── Alembic revision ID guard (hard gate) ────────────────
  # Rejects new migrations that use handcrafted sequential revision IDs or
  # introduce duplicate revision IDs (either would corrupt the migration DAG).
  # Pre-existing sequential IDs (v043–v072) and known duplicate IDs are
  # grandfathered — see scripts/check_alembic_revisions.py and #1296.
  alembic-revision-check:
    name: Alembic revision ID guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for sequential or duplicate Alembic revision IDs
        run: python scripts/check_alembic_revisions.py

      # ── Orphan migration guard (hard gate) ────────────────
      # Rejects new Flyway ``services/*/migrations/V*.sql`` files (Railway
      # runs alembic only — these never execute in prod) and new files
      # under ``docs/abandoned_migrations_*`` (quarantined during the
      # 2026-04-20 consolidation incident). Current orphans are
      # grandfathered via ``scripts/orphan_migrations_allowlist.txt``;
      # the allowlist must shrink monotonically — see #1864, #1872.
      - name: Guard against new orphan migrations
        run: python scripts/check_orphan_migrations.py

  # ── Dep version drift guard (hard gate) ─────────────────
  # Scans services/*/requirements*.txt to ensure no per-service file
  # lowers the floor for shared packages below pyproject.toml. Prevents
  # the pydantic-settings 2.1 vs 2.6 class of drift — see #1886.
  dep-version-check:
    name: Dep version drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for dependency version drift
        run: python scripts/check_dep_versions.py

  # ── Docker Build (consolidated monolith) ─────────────────
  # Production deploys a single consolidated monolith built from the
  # repo-root Dockerfile — see server/main.py and railway.toml. The per-
  # service Dockerfiles under services/<svc>/ are kept only so the local
  # docker-compose files still work; they're not built or deployed anywhere
  # and aren't gated here. See #1429 for the full drift cleanup plan.
  docker-build:
    name: Docker Build (monolith)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build root Dockerfile
        run: docker build -t regengine:test -f Dockerfile .

      - name: Verify image starts
        run: docker run --rm regengine:test python -c "print('Build OK')"

  # ── Security (Hard Gate) ─────────────────────────────────
  security:
    name: Security Audit ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        service: [admin, compliance, graph, ingestion, nlp, scheduler]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pip-audit
        run: |
          # Root requirements.lock is the single source of truth (per #1429 /
          # #1433 which removed per-service requirements.txt files; #1139 moved
          # to pip-compile lockfile). The matrix still fans out by service name
          # to preserve historical check names on branch-protection rules;
          # every job audits the same consolidated dependency set.
          pip install pip-audit
          pip-audit -r requirements.lock --desc on

  # ── CI Summary ───────────────────────────────────────────
  ci-status:
    name: CI Status Gate
    if: always()
    needs: [test, lint, lint-shared, docker-build, security, rls-fallback-check, alembic-revision-check, dep-version-check]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Test:              ${{ needs.test.result }}"
          echo "Lint:              ${{ needs.lint.result }}"
          echo "Lint shared/:      ${{ needs.lint-shared.result }}"
          echo "Docker:            ${{ needs.docker-build.result }}"
          echo "Security:          ${{ needs.security.result }}"
          echo "RLS fallback:      ${{ needs.rls-fallback-check.result }}"
          echo "Alembic rev IDs:   ${{ needs.alembic-revision-check.result }}"
          echo "Dep drift guard:   ${{ needs.dep-version-check.result }}"
          # Lint is now blocking — flake8 F821 (undefined name) would
          # have caught PR #1482's NLP NameError class of bugs if this
          # gate had been enforcing. Promoting lint to a hard gate so
          # the next occurrence trips on PR open rather than in prod.
          if [[ "${{ needs.test.result }}" == "failure" \
             || "${{ needs.lint.result }}" == "failure" \
             || "${{ needs.lint-shared.result }}" == "failure" \
             || "${{ needs.security.result }}" == "failure" \
             || "${{ needs.rls-fallback-check.result }}" == "failure" \
             || "${{ needs.alembic-revision-check.result }}" == "failure" \
             || "${{ needs.dep-version-check.result }}" == "failure" ]]; then
            echo "::error::Test, Lint, Security Audit, RLS fallback, Alembic revision ID, or dep version drift guard failed"
            exit 1
          fi
          echo "All checks passed"
