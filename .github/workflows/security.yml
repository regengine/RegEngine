name: security

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly: Monday 06:00 UTC

permissions:
  contents: read
  pull-requests: read

jobs:
  # ──────────────────────────────────────────────
  # 1. Secrets Scan (gitleaks)
  # ──────────────────────────────────────────────
  secrets:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ──────────────────────────────────────────────
  # 1b. Secrets Audit (detect-secrets) — #1173
  # ──────────────────────────────────────────────
  # Complements gitleaks (#1). gitleaks is a broad regex scanner with an
  # allowlist; detect-secrets is the same scanner we run in pre-commit and
  # produces a "new vs baseline" diff against `.secrets.baseline`. Running
  # it here enforces the tighter-signal tool in CI instead of trusting that
  # every contributor has `pre-commit install` wired up locally.
  detect-secrets:
    name: Secrets Audit (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        # Pin matches .pre-commit-config.yaml (rev v1.5.0) so CI enforces
        # the same rules developers see locally.
        run: pip install detect-secrets==1.5.0

      - name: Scan for new secrets (fail on findings not in baseline)
        # The pre-commit hook uses the same baseline/exclude list; mirror it
        # here so pre-commit and CI agree on which files are in scope.
        # `detect-secrets-hook` is the CLI the pre-commit hook invokes — it
        # exits non-zero when it finds a potential secret that isn't already
        # captured in `.secrets.baseline`.
        run: |
          detect-secrets-hook \
            --baseline .secrets.baseline \
            --exclude-files '.*\.lock$' \
            --exclude-files '.*package-lock\.json$' \
            --exclude-files '\.secrets\.baseline$' \
            $(git ls-files)

      - name: Baseline report (informational)
        # Prints the current baseline contents as a JSON report so reviewers
        # can see what's been accepted as a known false positive. Purely
        # informational — does not gate the build.
        run: detect-secrets audit --report .secrets.baseline

  # ──────────────────────────────────────────────
  # 2. SAST (Semgrep — CLI, not deprecated action)
  # ──────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install and run Semgrep
        run: |
          pip install semgrep
          semgrep \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --exclude-rule python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text \
            --json --output semgrep-results.json

          # Results are uploaded as artifacts AND also checked for critical/high findings below
          # The avoid-sqlalchemy-text rule is excluded because all text() usage
          # in this codebase uses parameterized :param syntax, not f-string
          # interpolation. Semgrep cannot distinguish the two patterns.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Semgrep OWASP hard gate (fail on critical/high)
        run: |
          pip install semgrep
          semgrep --config=p/owasp-top-ten \
            --exclude-rule python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text \
            --error .
          # --error causes semgrep to exit non-zero if any findings are found.
          # This step intentionally fails CI on security findings.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Gate: ERROR-level findings fail CI. See issue #1157.
      # p/security-audit findings were previously uploaded as an artifact only
      # (silently ignored on PRs). This step gates the build on ERROR severity
      # findings from that ruleset. WARNING-level findings are informational
      # and do not block CI, keeping the gate signal-to-noise ratio manageable.
      - name: Semgrep security-audit gate (fail on ERROR severity -- #1157)
        run: |
          pip install semgrep
          semgrep --config=p/security-audit \
            --exclude-rule python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text \
            --severity ERROR \
            --error .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Semgrep EPIC-A scan (tenant_id trust — #1651, advisory until rollout)
        run: |
          pip install semgrep
          # Advisory-only while EPIC-A rollout is in flight. Emits findings
          # to the log but does not fail the build. Each finding corresponds
          # to a call site that an EPIC-A child issue is migrating to
          # resolve_tenant_context(). Promote to --error (blocking) once
          # the open EPIC-A children under label `epic-a-tenant-trust` reach
          # zero. See services/shared/tenant_context.py.
          semgrep --config=.semgrep/tenant-trust.yaml . \
            --json --output semgrep-tenant-trust.json || true
          # Summary line for reviewers (count by rule).
          python3 -c "
          import json
          data = json.load(open('semgrep-tenant-trust.json'))
          results = data.get('results', [])
          if not results:
              print('EPIC-A: clean — promote this step to --error.')
          else:
              from collections import Counter
              by_rule = Counter(r['check_id'].split('.')[-1] for r in results)
              print(f'EPIC-A: {len(results)} findings (advisory):')
              for k, v in by_rule.most_common():
                  print(f'  {v:3d}  {k}')
          "
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload EPIC-A Semgrep results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: semgrep-tenant-trust
          path: semgrep-tenant-trust.json
          retention-days: 90

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # 3. Dependency Audit (pip-audit / npm audit)
  # ──────────────────────────────────────────────
  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # ---- Node (frontend/) ----
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: npm audit
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm install --package-lock-only 2>/dev/null || npm install
            npm audit --audit-level=high --json > ../npm-audit-results.json || true
            npm audit --audit-level=high
            cd ..
          else
            echo "No Node project detected."
            echo '{"info": "no node project"}' > npm-audit-results.json
          fi

      # ---- Python (if present) ----
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: pip-audit
        run: |
          python -m pip install -U pip pip-audit
          # Include root requirements.lock (pip-compile output, #1139) alongside
          # any per-service requirements*.txt files still present.
          python_files=$( { find . -name requirements.txt -not -path "./.venv/*" -not -path "./frontend/*"; [ -f requirements.lock ] && echo ./requirements.lock; } | sort)
          if [ -n "$python_files" ]; then
            printf '%s\n' "$python_files" > pip-audit-targets.txt
            printf '{\n  "audits": [\n' > pip-audit-results.json
            first=1
            while IFS= read -r req_file; do
              [ -n "$req_file" ] || continue
              echo "Auditing $req_file"
              audit_json=$(mktemp)
              pip-audit -r "$req_file" --format json --output "$audit_json" || true
              pip-audit -r "$req_file"
              if [ $first -eq 0 ]; then
                printf ',\n' >> pip-audit-results.json
              fi
              printf '    {\n      "file": "%s",\n      "results": ' "$req_file" >> pip-audit-results.json
              cat "$audit_json" >> pip-audit-results.json
              printf '\n    }' >> pip-audit-results.json
              first=0
              rm -f "$audit_json"
            done < pip-audit-targets.txt
            printf '\n  ]\n}\n' >> pip-audit-results.json
          elif [ -f pyproject.toml ]; then
            pip-audit --format json --output pip-audit-results.json || true
            pip-audit
          else
            echo "No Python deps detected."
            echo '{"info": "no python project"}' > pip-audit-results.json
          fi

      - name: Upload dependency audit results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dependency-audit
          path: |
            npm-audit-results.json
            pip-audit-results.json
            pip-audit-targets.txt
          retention-days: 90

  # ──────────────────────────────────────────────
  # 4. Tenant Isolation Tests
  # ──────────────────────────────────────────────
  tenant-isolation:
    name: Tenant Isolation & Auth Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          # Install from the root requirements.lock (pip-compile output; #1139).
          # Falls back silently if the file isn't present so tenant-isolation
          # tests still run on branches predating this migration.
          if [ -f requirements.lock ]; then
            pip install --require-hashes -r requirements.lock || true
          fi
          pip install pytest httpx pytest-json-report pytest-asyncio requests sqlalchemy psycopg2-binary

      - name: Run tenant isolation tests
        run: |
          bash scripts/security/tenant_isolation_test.sh
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_API_BASE: ${{ secrets.TEST_API_BASE }}

      - name: Upload isolation test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: tenant-isolation-results
          path: artifacts/tenant-isolation/
          retention-days: 90

  # ──────────────────────────────────────────────
  # 5. DAST (OWASP ZAP baseline)
  # ──────────────────────────────────────────────
  dast:
    name: DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: ZAP baseline scan
        run: |
          if [ -z "${ZAP_TARGET:-}" ]; then
            echo "SKIP: ZAP_TARGET not configured. Set it in GitHub Secrets to enable DAST."
            exit 0
          fi
          bash scripts/security/zap_baseline.sh
        env:
          ZAP_TARGET: ${{ secrets.ZAP_TARGET }}

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: zap-reports
          path: artifacts/zap/
          retention-days: 90

  # ──────────────────────────────────────────────
  # 6. security.txt Expiry Check
  # ──────────────────────────────────────────────
  security-txt-expiry:
    name: security.txt Expiry Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Check security.txt expiration
        run: |
          EXPIRES=$(grep -i "^Expires:" frontend/public/.well-known/security.txt | awk '{print $2}')
          if [ -z "$EXPIRES" ]; then
            echo "WARNING: No Expires field in security.txt"
            exit 1
          fi
          EXPIRES_EPOCH=$(date -d "$EXPIRES" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$EXPIRES" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRES_EPOCH - NOW_EPOCH) / 86400 ))
          echo "security.txt expires in $DAYS_LEFT days ($EXPIRES)"
          if [ "$DAYS_LEFT" -lt 30 ]; then
            echo "CRITICAL: security.txt expires in less than 30 days. Update immediately."
            exit 1
          elif [ "$DAYS_LEFT" -lt 90 ]; then
            echo "WARNING: security.txt expires in less than 90 days. Plan rotation."
          fi

  # ──────────────────────────────────────────────
  # 7. Container Scan (Trivy) — consolidated monolith image
  # ──────────────────────────────────────────────
  # Scans the single image Railway actually deploys (repo-root Dockerfile).
  # The per-service images under services/<svc>/ aren't deployed and were
  # dropping fail-open on the ecosystem's Trivy DB churn. See #1429.
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [secrets, sast, deps]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build image
        run: docker build -t regengine:ci -f Dockerfile .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: "regengine:ci"
          format: "json"
          output: "trivy.json"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: trivy
          path: trivy.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # 8. Audit Chain Integrity (ISO 27001 12.7.1)
  # ──────────────────────────────────────────────
  audit-integrity:
    name: Audit Chain Integrity
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Validate audit chain secrets
        id: validate_audit
        env:
          AUDIT_API_BASE: ${{ secrets.AUDIT_API_BASE }}
          AUDIT_TOKEN: ${{ secrets.AUDIT_VERIFY_TOKEN }}
        run: |
          if [ -z "$AUDIT_API_BASE" ] || [ -z "$AUDIT_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping audit chain check (missing AUDIT_API_BASE or AUDIT_VERIFY_TOKEN)."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run audit chain check
        if: steps.validate_audit.outputs.ready == 'true'
        env:
          AUDIT_API_BASE: ${{ secrets.AUDIT_API_BASE }}
          AUDIT_TOKEN: ${{ secrets.AUDIT_VERIFY_TOKEN }}
        run: |
          chmod +x scripts/security/verify_audit_chain.sh
          bash scripts/security/verify_audit_chain.sh

      - name: Audit chain check skipped
        if: steps.validate_audit.outputs.ready != 'true'
        run: |
          echo "Audit chain check skipped due to missing secrets"
