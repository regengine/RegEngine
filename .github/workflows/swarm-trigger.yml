# ═══════════════════════════════════════════════════════════
# 🤖 Swarm Trigger — Autonomous Agent Dispatch via Comments
# ═══════════════════════════════════════════════════════════
#
# Trigger the agent swarm by commenting on any open issue:
#   @swarm solve this
#   @swarm analyze
#   @swarm review PR #42
#   @swarm label
#   @swarm security audit
#   @swarm help
#
# Safety: Only authorized users (defined in intent.py) can trigger.
# The swarm posts results back as a comment on the issue.

name: "🤖 Swarm Trigger"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  dispatch:
    name: "🧬 Agent Swarm Dispatch"
    runs-on: ubuntu-latest
    # Only trigger on @swarm mentions in open issues
    if: >-
      contains(github.event.comment.body, '@swarm') &&
      github.event.issue.state == 'open'

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install Dependencies"
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet PyGithub>=2.1.0

      - name: "🔍 Parse Intent"
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 -c "
          import os, json, sys
          sys.path.insert(0, '.')
          from regengine.swarm.intent import parse_intent, is_authorized

          author = os.environ['COMMENT_AUTHOR']
          body = os.environ['COMMENT_BODY']
          issue = int(os.environ['ISSUE_NUMBER'])

          # Authorization check
          if not is_authorized(author):
              print(f'::warning::Unauthorized user: {author}')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('authorized=false\n')
              sys.exit(0)

          # Parse intent
          intent = parse_intent(body, issue, author)
          print(f'Command: {intent.command.value}')
          print(f'Confidence: {intent.confidence}')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'authorized=true\n')
              f.write(f'command={intent.command.value}\n')
              f.write(f'confidence={intent.confidence}\n')
              f.write(f'extra_context={intent.extra_context}\n')
          "

      - name: "🛑 Unauthorized User"
        if: steps.parse.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Swarm Access Denied**\n\n' +
                    `@${context.payload.comment.user.login} is not authorized to trigger the agent swarm.\n\n` +
                    'Contact the repository owner to be added to the authorized users list.'
            });

      - name: "💬 Acknowledge Command"
        if: steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const command = '${{ steps.parse.outputs.command }}';
            const emoji = {
              'solve': '🧠', 'analyze': '🔍', 'review': '📝',
              'label': '🏷️', 'security_audit': '🔒', 'help': '❓'
            }[command] || '🤖';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} **Swarm activated** — executing \`${command}\` command...\n\n` +
                    `Triggered by @${context.payload.comment.user.login}\n\n` +
                    '⏳ This may take a few minutes. Results will be posted here.'
            });

      - name: "❓ Handle Help"
        if: steps.parse.outputs.command == 'help'
        uses: actions/github-script@v7
        with:
          script: |
            const helpText = [
              '## 🤖 Agent Swarm — Available Commands\n',
              '| Command | Description |',
              '|---------|-------------|',
              '| `@swarm solve this` | Full chain: plan → code → review → test |',
              '| `@swarm analyze` | Analyze the issue without writing code |',
              '| `@swarm review PR #42` | Review a pull request |',
              '| `@swarm label` | Auto-label this issue |',
              '| `@swarm security audit` | Run a security scan on related files |',
              '| `@swarm help` | Show this help message |',
              '',
              '---',
              '*Powered by RegEngine Autonomous Agent Swarm v0.1.0*'
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: helpText
            });

      - name: "🧬 Execute Swarm"
        if: >-
          steps.parse.outputs.authorized == 'true' &&
          steps.parse.outputs.command != 'unknown' &&
          steps.parse.outputs.command != 'help'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          LLM_MODEL: "gpt-4o"
          SWARM_COMMAND: ${{ steps.parse.outputs.command }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          python3 -c "
          import os, sys, json
          sys.path.insert(0, '.')

          from regengine.swarm.intent import (
              parse_intent, format_swarm_response, SwarmCommand
          )
          from regengine.swarm.coordinator import AgentSwarm
          from regengine.swarm.github_integration import GitHubClient, IssueLabelClassifier

          command = os.environ['SWARM_COMMAND']
          issue_num = int(os.environ['ISSUE_NUMBER'])
          author = os.environ['COMMENT_AUTHOR']
          body = os.environ['COMMENT_BODY']
          repo = os.environ['GITHUB_REPO']

          intent = parse_intent(body, issue_num, author)
          gh = GitHubClient(repo_name=repo)
          issue = gh.get_issue(issue_num)

          try:
              if command == 'solve':
                  task = f\"Solve GitHub Issue #{issue_num}: {issue['title']}\n\n{issue['body']}\"
                  swarm = AgentSwarm()
                  result = swarm.solve(task)
                  response = format_swarm_response(intent, result.to_dict())

              elif command == 'analyze':
                  from regengine.swarm.agents import PlannerAgent
                  task = f\"Analyze GitHub Issue #{issue_num}: {issue['title']}\n\n{issue['body']}\"
                  planner = PlannerAgent()
                  output = planner.run(task)
                  response = format_swarm_response(intent, {
                      'status': 'completed',
                      'agents_used': ['PlannerAgent'],
                      'iterations': 1,
                      'duration_seconds': output['duration_seconds'],
                      'plan': output['result'],
                  })

              elif command == 'label':
                  classifier = IssueLabelClassifier()
                  classification = classifier.classify(issue['title'], issue['body'])
                  if classification['labels'] and classification['confidence'] >= 0.7:
                      gh.label_issue(issue_num, classification['labels'])
                  response = (
                      f\"## 🏷️ Auto-Label Result\n\n\"
                      f\"**Labels:** {', '.join(classification['labels']) or 'None'}\n\"
                      f\"**Confidence:** {classification['confidence']:.0%}\n\"
                      f\"**Reasoning:** {classification['reasoning']}\n\"
                  )

              elif command == 'security_audit':
                  from regengine.swarm.agents import ReviewerAgent
                  task = f\"Security audit for Issue #{issue_num}: {issue['title']}\n\n{issue['body']}\"
                  reviewer = ReviewerAgent()
                  output = reviewer.run(task)
                  response = format_swarm_response(intent, {
                      'status': 'completed',
                      'agents_used': ['ReviewerAgent'],
                      'iterations': 1,
                      'duration_seconds': output['duration_seconds'],
                      'review': output['result'],
                  })

              else:
                  response = '❓ Unknown command. Use \`@swarm help\` for options.'

              gh.comment_on_issue(issue_num, response)

          except Exception as e:
              error_response = format_swarm_response(intent, {}, error=str(e))
              gh.comment_on_issue(issue_num, error_response)
              sys.exit(1)
          "

      - name: "📊 Upload Swarm Logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-execution-${{ github.event.issue.number }}
          path: .swarm_memory/
          retention-days: 30
          if-no-files-found: ignore
