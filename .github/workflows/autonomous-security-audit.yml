name: 🛡️ Autonomous Security Audit

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)

      - name: 🤖 Run Security Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4-turbo-preview' }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Get PR diff
          PR_NUMBER=${{ github.event.pull_request.number }}
          gh pr diff $PR_NUMBER > pr_diff.txt
          DIFF_CONTENT=$(cat pr_diff.txt)
          
          # Run specialized security audit command (will be added to CLI)
          python3 -m regengine.swarm run --task "Audit PR #$PR_NUMBER for security vulnerabilities. Diff: $DIFF_CONTENT" --agent security
