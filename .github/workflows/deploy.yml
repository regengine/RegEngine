name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'alembic/**'
      - 'server/**'
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'plugins/fsma/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'railway.toml'
      - 'requirements.in'
      - 'requirements.lock'
      - 'scripts/run-migrations.sh'
  workflow_dispatch:

permissions:
  checks: read
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # Gate: wait for CI workflows to pass before deploying.
  # These workflows are triggered by the same push-to-main event;
  # workflow_run waits for their conclusion before starting this job.
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check backend CI status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const sha = context.sha;
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              filter: 'latest',
            });
            const required = ['Backend CI / test', 'Frontend CI / build'];
            const pending = required.filter(name =>
              !checks.data.check_runs.some(cr => cr.name.startsWith(name) && cr.conclusion === 'success')
            );
            if (pending.length > 0) {
              // CI hasn't finished yet — retry via workflow_dispatch or wait
              core.info(`Waiting for: ${pending.join(', ')}`);
            }

      - name: Require CI green
        uses: lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800  # v1.7.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: 'Wait for CI'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Match whichever CI Status Gate jobs are created for this path set.
          # GitHub Checks API returns job names, not "workflow / job" format.
          # Backend CI can take several minutes to create its summary gate
          # while matrix jobs are still queued, so keep discovery patient.
          check-regexp: 'CI Status Gate'
          wait-interval: 30
          checks-discovery-timeout: 900
          allowed-conclusions: success

  deploy:
    name: Deploy RegEngine Service
    needs: [wait-for-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway deployment secrets
        id: validate_railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          missing=()
          [ -z "$RAILWAY_TOKEN" ] && missing+=("RAILWAY_TOKEN")
          [ -z "$RAILWAY_PROJECT_ID" ] && missing+=("RAILWAY_PROJECT_ID")
          [ -z "$RAILWAY_ENVIRONMENT_ID" ] && missing+=("RAILWAY_ENVIRONMENT_ID")
          [ -z "$RAILWAY_SERVICE_ID" ] && missing+=("RAILWAY_SERVICE_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Railway secrets not configured (${missing[*]}). Skipping deploy — Railway GitHub integration handles deploys automatically."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Railway
        if: steps.validate_railway.outputs.ready == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          railway up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            --service "$RAILWAY_SERVICE_ID"
