name: Infra K8s CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/k8s/**'
      - '.github/workflows/infra-k8s-ci.yml'
  push:
    branches: [main]
    paths:
      - 'infra/k8s/**'
      - '.github/workflows/infra-k8s-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra-k8s-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-kustomize:
    name: Production Kustomize Render
    runs-on: ubuntu-latest
    env:
      KUSTOMIZE_VERSION: v5.8.1
      KUSTOMIZE_SHA256: 029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install pinned Kustomize
        run: |
          curl -sSfL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/kustomize.tar.gz
          echo "${KUSTOMIZE_SHA256}  /tmp/kustomize.tar.gz" | sha256sum -c -
          tar -xzf /tmp/kustomize.tar.gz -C /tmp kustomize
          sudo install -m 0755 /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Render production overlay
        run: |
          kustomize build infra/k8s/overlays/production > production-manifest.yaml

      - name: Require production isolation and runtime objects
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("production-manifest.yaml").read_text()
          forbidden = ("replace-with", ".example.invalid")
          for token in forbidden:
              if token in manifest:
                  print(f"::error::Production manifest contains placeholder token: {token}")
                  raise SystemExit(1)

          found = set()

          for document in manifest.split("\n---\n"):
              kind = None
              name = None
              in_metadata = False

              for line in document.splitlines():
                  if line.startswith("kind: "):
                      kind = line.split(":", 1)[1].strip()
                  elif line == "metadata:":
                      in_metadata = True
                  elif in_metadata and line.startswith("  name: "):
                      name = line.split(":", 1)[1].strip()
                      break
                  elif in_metadata and line and not line.startswith(" "):
                      in_metadata = False

              if kind and name:
                  found.add((kind, name))

          expected = {
              ("Deployment", "admin-service"),
              ("Deployment", "compliance-service"),
              ("Deployment", "graph-service"),
              ("Deployment", "ingestion-service"),
              ("Deployment", "nlp-service"),
              ("Deployment", "scheduler"),
              ("NetworkPolicy", "admin-service"),
              ("NetworkPolicy", "compliance-service"),
              ("NetworkPolicy", "graph-service"),
              ("NetworkPolicy", "ingestion-service"),
              ("NetworkPolicy", "nlp-service"),
              ("NetworkPolicy", "scheduler-service"),
              ("ConfigMap", "compliance-config"),
              ("ConfigMap", "graph-config"),
              ("ConfigMap", "ingestion-config"),
              ("ConfigMap", "nlp-config"),
              ("ConfigMap", "alertmanager-config"),
              ("StatefulSet", "alertmanager"),
              ("Service", "alertmanager"),
              ("NetworkPolicy", "alertmanager"),
          }

          missing = sorted(expected - found)
          if missing:
              for kind, name in missing:
                  print(f"::error::Missing {kind}/{name} from production manifest")
              raise SystemExit(1)

          print(f"Validated {len(expected)} production manifest objects")
          PY
