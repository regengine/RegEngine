name: Test Suite Health Check

on:
  pull_request:
    paths:
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.in'
      - 'requirements.lock'
      - '.github/workflows/test-suite-check.yml'
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.in'
      - 'requirements.lock'
      - '.github/workflows/test-suite-check.yml'

permissions:
  contents: read
  checks: write

jobs:
  # ── Full-suite collection guard (#1435) ─────────────────
  # Runs ``pytest --collect-only`` across the whole repo. Any collection
  # ERROR fails the build — this is the single check that prevents another
  # round of "9 test files silently fail to import". The root conftest.py
  # handles the multi-service ``app/`` path switching; per-service
  # pythonpath entries are no longer required.
  full-suite-collection:
    name: Full suite collects without errors
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          # Install the full runtime requirements so test modules that
          # import real libraries (httpx, fastapi, sqlalchemy, pydantic[email],
          # scipy, etc.) can be collected. Without this step, collection
          # breaks on the first third-party import.
          # --require-hashes enforces the pip-compile lockfile (#1139).
          if [ -f requirements.lock ]; then
            pip install --require-hashes -r requirements.lock
          fi

      - name: Collect whole suite and fail on any error
        run: |
          # --continue-on-collection-errors: pytest otherwise aborts at the
          # first ERROR and the summary line is never printed.
          # No -q so the "N tests collected, M errors" line survives.
          set +e
          OUTPUT=$(python3 -m pytest --collect-only --continue-on-collection-errors 2>&1)
          STATUS=$?
          set -e
          echo "--- pytest output (tail) ---"
          echo "$OUTPUT" | tail -30
          SUMMARY=$(echo "$OUTPUT" | grep -E '[0-9]+ tests? collected' | tail -1)
          COUNT=$(echo "$SUMMARY" | grep -oE '[0-9]+ tests? collected' | grep -oE '[0-9]+' || echo "0")
          ERRORS=$(echo "$SUMMARY" | grep -oE '[0-9]+ errors?' | grep -oE '[0-9]+' || echo "0")
          echo ""
          echo "Collected $COUNT tests ($ERRORS collection errors)"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS test files failed to collect. Fix the imports — see ERROR lines above. Re-run locally with:  python3 -m pytest --collect-only"
            echo "--- ERROR list ---"
            echo "$OUTPUT" | grep "^ERROR " || true
            exit 1
          fi
          if [ "$COUNT" -lt 1500 ]; then
            echo "::error::Collected tests fell below floor of 1500 (got $COUNT). Did a whole directory get skipped?"
            exit 1
          fi
          echo "✓ $COUNT tests collected, 0 collection errors"

  # ── Repo-root execution shard ─────────────────────────────
  # Collection-only checks prove importability, but they do not catch broken
  # assertions. Run a small offline repo-root slice so this workflow has at
  # least one behavioral gate outside the per-service ``tests/`` directories.
  repo-root-fast-shard:
    name: Repo-root fast shard executes
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services
      PYTHONDONTWRITEBYTECODE: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          if [ -f requirements.lock ]; then
            pip install --require-hashes -r requirements.lock
          fi

      - name: Run offline repo-root tests
        run: |
          python3 -m pytest \
            tests/sdk \
            tests/swarm \
            tests/scripts \
            tests/test_monolith_route_parity.py \
            tests/test_server_import_smoke.py \
            -q

  # ── Per-service collection checks ───────────────────────
  test-environment-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [admin, compliance, graph, ingestion, nlp, scheduler]

    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      
      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'
      

      
      - name: Install Dependencies
        run: |
          # Install from the root requirements.lock — the single source of
          # truth for runtime deps (pip-compile output; see #1139).
          # Per-service requirements.txt files are DEPRECATED stubs (#1429)
          # and will be removed when docker-compose is retired.
          if [ -f requirements.lock ]; then
            pip install --require-hashes -r requirements.lock
          fi
      
      - name: Setup Shared Module Bridge
        run: |
          # The graph service Dockerfile copies root shared/ into /app/shared/,
          # but locally the graph has its own shared/ dir. Copy missing files
          # from root shared/ into the service's shared/ to match Docker behavior.
          SERVICE_SHARED="services/${{ matrix.service }}/shared"
          if [ -d "$SERVICE_SHARED" ] && [ -d "shared" ]; then
            # Copy files from root shared/ that don't exist in service shared/
            for f in shared/*.py; do
              fname=$(basename "$f")
              if [ ! -f "$SERVICE_SHARED/$fname" ]; then
                cp "$f" "$SERVICE_SHARED/$fname"
                echo "  Copied $fname to $SERVICE_SHARED/"
              fi
            done
            echo "✓ Shared module bridge configured"
          fi
      
      - name: Check Test Collection
        run: |
          cd services/${{ matrix.service }}
          # Collect tests without running them
          python3 -m pytest --collect-only tests/ || {
            echo "ERROR: Test collection failed for ${{ matrix.service }}"
            echo "This usually means:"
            echo "  - Missing dependencies"
            echo "  - Import errors"
            echo "  - Missing environment variables"
            exit 1
          }
          echo "✓ Test collection passed"
      
      - name: Verify conftest.py Exists
        run: |
            cd services/${{ matrix.service }}
            if [ ! -f "conftest.py" ]; then
              echo "ERROR: Missing conftest.py in ${{ matrix.service }}"
              exit 1
            fi
            echo "✓ conftest.py exists"
      
      - name: Run Smoke Tests
        run: |
          cd services/${{ matrix.service }}
          # Run only smoke tests. Missing smoke files are reported, but real
          # smoke failures are no longer swallowed.
          shopt -s nullglob
          smoke_tests=(tests/test_smoke*.py)
          if [ ${#smoke_tests[@]} -eq 0 ]; then
            echo "::notice::No smoke tests found for ${{ matrix.service }}"
            exit 0
          fi
          python3 -m pytest "${smoke_tests[@]}" -v
  
