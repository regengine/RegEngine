name: Test Suite Health Check

on:
  pull_request:
    paths:
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/test-suite-check.yml'
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'kernel/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/test-suite-check.yml'

permissions:
  contents: read
  checks: write

jobs:
  # ── Root test suite collection guard ────────────────────
  # Catches broken imports / missing modules before they silently zero-out the suite.
  root-test-collection:
    name: Root tests collect (min 500)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services:${{ github.workspace }}/services/ingestion:${{ github.workspace }}/services/nlp:${{ github.workspace }}/services/admin
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          # Install the full runtime requirements so test modules that import
          # real libraries (httpx, fastapi, sqlalchemy, etc.) can be collected.
          # Without this step, any test that imports a third-party library
          # errors at pytest --collect-only and the suite count drops to 0.
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-asyncio

      - name: Collect root tests and enforce minimum count
        run: |
          COLLECTED=$(python3 -m pytest tests/ --collect-only -q 2>&1 | tail -1)
          echo "Collection result: $COLLECTED"
          # Extract the count of collected tests (e.g. "598 tests collected")
          COUNT=$(echo "$COLLECTED" | grep -oP '^\d+' || echo "0")
          echo "Collected $COUNT tests"
          if [ "$COUNT" -lt 500 ]; then
            echo "::error::Root test collection fell below 500 (got $COUNT). This likely means a broken import or missing module."
            python3 -m pytest tests/ --collect-only -q 2>&1 | grep "ERROR" || true
            exit 1
          fi
          echo "✓ $COUNT root tests collected (minimum: 500)"

  # ── Per-service collection checks ───────────────────────
  test-environment-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [admin, compliance, graph, ingestion, nlp, scheduler]

    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      

      
      - name: Install Dependencies
        run: |
          # Install from the root requirements.txt — the single source of
          # truth for runtime deps. Per-service requirements.txt files are
          # DEPRECATED stubs (#1429) and will be removed when docker-compose
          # is retired.
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-asyncio
      
      - name: Setup Shared Module Bridge
        run: |
          # The graph service Dockerfile copies root shared/ into /app/shared/,
          # but locally the graph has its own shared/ dir. Copy missing files
          # from root shared/ into the service's shared/ to match Docker behavior.
          SERVICE_SHARED="services/${{ matrix.service }}/shared"
          if [ -d "$SERVICE_SHARED" ] && [ -d "shared" ]; then
            # Copy files from root shared/ that don't exist in service shared/
            for f in shared/*.py; do
              fname=$(basename "$f")
              if [ ! -f "$SERVICE_SHARED/$fname" ]; then
                cp "$f" "$SERVICE_SHARED/$fname"
                echo "  Copied $fname to $SERVICE_SHARED/"
              fi
            done
            echo "✓ Shared module bridge configured"
          fi
      
      - name: Check Test Collection
        run: |
          cd services/${{ matrix.service }}
          # Collect tests without running them
          python3 -m pytest --collect-only tests/ || {
            echo "ERROR: Test collection failed for ${{ matrix.service }}"
            echo "This usually means:"
            echo "  - Missing dependencies"
            echo "  - Import errors"
            echo "  - Missing environment variables"
            exit 1
          }
          echo "✓ Test collection passed"
      
      - name: Verify conftest.py Exists
        run: |
            cd services/${{ matrix.service }}
            if [ ! -f "conftest.py" ]; then
              echo "ERROR: Missing conftest.py in ${{ matrix.service }}"
              exit 1
            fi
            echo "✓ conftest.py exists"
      
      - name: Run Smoke Tests
        run: |
          cd services/${{ matrix.service }}
          # Run only smoke tests
          python3 -m pytest tests/test_smoke*.py -v || true
  
