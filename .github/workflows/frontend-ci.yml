name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Build ────────────────────────────────────────────────
  build:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build production bundle
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
          NEXT_PUBLIC_API_BASE_URL: https://regengine.co
          INGESTION_SERVICE_URL: http://localhost:8002
          COMPLIANCE_SERVICE_URL: http://localhost:8003
          ADMIN_SERVICE_URL: http://localhost:8001
        run: |
          cd frontend
          npm run build

      - name: Bundle size report
        run: |
          cd frontend
          echo "### 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/chunks/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        env:
          NEXT_PUBLIC_API_BASE_URL: https://regengine.co
          INGESTION_SERVICE_URL: http://localhost:8002
          COMPLIANCE_SERVICE_URL: http://localhost:8003
          ADMIN_SERVICE_URL: http://localhost:8001
        run: |
          cd frontend
          npm run lint

  # ── Tests ────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Vitest
        run: |
          cd frontend
          npm run test:run

  # ── Security ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high

  # ── CI Summary ───────────────────────────────────────────
  ci-status:
    name: CI Status Gate
    if: always()
    needs: [build, lint, test, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Build:    ${{ needs.build.result }}"
          echo "Lint:     ${{ needs.lint.result }}"
          echo "Tests:    ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "E2E:      advisory (runs separately)"
          if [[ "${{ needs.build.result }}" == "failure" \
             || "${{ needs.lint.result }}" == "failure" \
             || "${{ needs.test.result }}" == "failure" \
             || "${{ needs.security.result }}" == "failure" ]]; then
            echo "::error::Build, lint, unit tests, or security audit failed"
            exit 1
          fi
          echo "All blocking frontend checks passed"

  # ── E2E Tests (Playwright) ───────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Preflight — verify secrets and backend are ready
        env:
          # Production is a single consolidated monolith at this URL
          # (Dockerfile at repo root → server/main.py, mounts all 6 former
          # microservice routers). Point the preflight + tests at it so the
          # health curl actually reaches something instead of localhost:8001.
          ADMIN_SERVICE_URL: https://regengine-production.up.railway.app
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          MISSING=()
          [[ -z "$TEST_USER_EMAIL" ]]          && MISSING+=("TEST_USER_EMAIL")
          [[ -z "$TEST_PASSWORD" ]]             && MISSING+=("TEST_PASSWORD")
          [[ -z "$JWT_SIGNING_KEY" ]]          && MISSING+=("JWT_SIGNING_KEY")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::E2E requires GitHub Secrets that are not configured: ${MISSING[*]}"
            echo "::error::Set these in Settings → Secrets → Actions before E2E can pass."
            exit 1
          fi
          echo "Checking admin service health at $ADMIN_SERVICE_URL..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$ADMIN_SERVICE_URL/health" || echo "000")
          if [[ "$STATUS" != "200" ]]; then
            echo "::error::Admin service is unreachable (HTTP $STATUS)."
            echo "::error::Fix the Railway deployment before E2E can pass: $ADMIN_SERVICE_URL"
            exit 1
          fi
          echo "All preflight checks passed. Proceeding with E2E tests."

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Run E2E tests
        id: run_e2e
        continue-on-error: true
        env:
          # NOTE: NEXT_PUBLIC_API_BASE_URL is intentionally NOT set here.
          # The dev webServer runs on localhost:3001. Setting a production base URL
          # causes the browser to make cross-origin requests (CORS blocked) instead
          # of routing through the Next.js proxy rewrites. Individual service URLs
          # are still set so next.config.js rewrites route correctly server-side.
          #
          # All three point to the same Railway monolith (root Dockerfile +
          # server/main.py mounts every former microservice's routers). The
          # earlier localhost:* defaults required a docker-compose step that
          # never existed — preflight curled a dead port and bailed with 000.
          INGESTION_SERVICE_URL: https://regengine-production.up.railway.app
          COMPLIANCE_SERVICE_URL: https://regengine-production.up.railway.app
          ADMIN_SERVICE_URL: https://regengine-production.up.railway.app
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          # Supabase env vars intentionally NOT set here.
          # E2E tests use admin service JWT auth only. The playwright.config.ts
          # sets NEXT_PUBLIC_SUPABASE_URL='' so middleware skips Supabase
          # cross-validation (hasSomeSupabaseCookie returns true when Supabase
          # is not configured). Production still enforces both auth systems.
          # JWT signing key — MUST match the value set on the admin service (Railway).
          # The Next.js middleware verifies re_access_token cookies with this key.
          # Without it, every authenticated route redirects to login?error=session_expired.
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          JWT_PREVIOUS_KEY: ${{ secrets.JWT_PREVIOUS_KEY }}
          # Optional: dedicated sysadmin account for admin-only test flows.
          # Falls back to TEST_USER_EMAIL if not set (works when test user has sysadmin role).
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          # Playwright base URL — set in Secrets to target staging; defaults to local dev server
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
        run: |
          cd frontend
          npm run test:e2e

      - name: Upload Playwright test results
        if: steps.run_e2e.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 14

      - name: Report advisory E2E failure
        if: steps.run_e2e.outcome == 'failure'
        run: |
          echo "::warning::Playwright E2E failed in advisory mode. Build, lint, unit tests, and security audit remain the gating checks."
          {
            echo "### Playwright E2E"
            echo ""
            echo "Playwright E2E failed in advisory mode. Download the uploaded playwright-results artifact for traces and screenshots."
          } >> "$GITHUB_STEP_SUMMARY"
