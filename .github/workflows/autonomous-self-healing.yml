name: 🧬 Autonomous Self-Healing CI

on:
  workflow_run:
    workflows: ["Backend Services CI/CD"]
    types: [completed]

jobs:
  diagnose-and-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Setup project root for imports
          export PYTHONPATH=$PYTHONPATH:$(pwd)

      - name: Fetch failed logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Analyzing Run ID: $RUN_ID"
          gh run view $RUN_ID --log > ci_failure.log
          # Get the last 1000 lines as a searchable snippet
          tail -n 1000 ci_failure.log > failure_snippet.txt

      - name: 🤖 Invoke Resilience Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4-turbo-preview' }}
          GITHUB_REPO: ${{ github.repository }}
          # Set flag to tell the swarm we are in CI and should commit changes
          REGENGINE_CI_AUTO_FIX: "true"
        run: |
          cat failure_snippet.txt | python3 -m regengine.swarm troubleshoot --log-file -
