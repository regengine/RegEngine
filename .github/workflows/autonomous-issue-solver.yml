name: 🧬 Autonomous Issue Solver

on:
  issues:
    types: [labeled]

jobs:
  solve-issue:
    if: github.event.label.name == 'agent:solve'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)

      - name: 🤖 Solve Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4-turbo-preview' }}
          GITHUB_REPO: ${{ github.repository }}
          # Tell the swarm to commit and open PRs
          REGENGINE_CI_AUTO_FIX: "true"
        run: |
          python3 -m regengine.swarm solve --issue ${{ github.event.issue.number }} --repo ${{ github.repository }}
