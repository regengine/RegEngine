name: 🧹 Autonomous Janitor (Auto-Merge)

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Manual trigger

jobs:
  sweep-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)

      - name: 🤖 Run Janitor Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4-turbo-preview' }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Use CLI to run janitor sweep
          python3 -m regengine.swarm run --task "Evaluate all open Pull Requests for autonomous merge readiness." --agent janitor
