name: Agent Task
description: Define a scoped engineering task for one of the supported agent roles
title: "[AGENT] "
labels: ["agent-task"]
body:
  - type: dropdown
    id: role
    attributes:
      label: Agent Role
      description: Which supported role should handle this?
      options:
        - "planner"
        - "implementer"
        - "security_review"
    validations:
      required: true

  - type: dropdown
    id: work-lane
    attributes:
      label: Work Lane
      description: Which plain engineering lane owns the work?
      options:
        - "backend"
        - "frontend"
        - "security"
        - "QA"
        - "infra"
        - "docs"
        - "FSMA domain"
        - "Inflow Workbench"
    validations:
      required: true

  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      description: What kind of work is this?
      options:
        - "feature - New functionality"
        - "fix - Bug fix"
        - "audit - Review existing code"
        - "test - Add or improve tests"
        - "docs - Documentation update"
        - "refactor - Code improvement"
    validations:
      required: true

  - type: dropdown
    id: production-spine
    attributes:
      label: Production Spine
      description: Which part of the FSMA path is affected?
      options:
        - "ingest"
        - "normalize"
        - "validate"
        - "persist evidence"
        - "export"
        - "admin/operator workflow"
        - "infra/CI only"
        - "docs only"
    validations:
      required: true

  - type: dropdown
    id: risk-level
    attributes:
      label: Risk Level
      description: How risky is the change?
      options:
        - "low"
        - "medium"
        - "high"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be accomplished?
      placeholder: |
        One concise paragraph describing the target outcome.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files Likely Touched
      description: Name the expected files or directories. Use "unknown" only if discovery is the task.
      placeholder: |
        - services/ingestion/...
        - frontend/src/...
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out Of Scope
      description: What must not be changed?
      placeholder: |
        - No schema changes
        - No auth behavior changes
        - No unrelated refactors
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests Required
      description: Which commands must pass before closing?
      placeholder: |
        - python3 -m pytest ...
        - cd frontend && npm run test:run
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, links, or references
      placeholder: |
        Related issues, PRs, documentation links, or screenshots
    validations:
      required: false
