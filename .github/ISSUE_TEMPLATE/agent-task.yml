name: Agent Task
description: Dispatch a scoped task to a RegEngine bot team
title: "[AGENT] "
labels: ["agent-task"]
body:
  - type: dropdown
    id: agent
    attributes:
      label: Assigned Bot Team
      description: Which lane should own the first pass?
      options:
        - "Bot-FSMA (FDA FSMA 204 Specialist)"
        - "Bot-Inflow (Workbench and Supplier Ingest)"
        - "Bot-Backend (FastAPI, Persistence, Migrations)"
        - "Bot-Frontend (Next.js App Router and UX)"
        - "Bot-Security (Auth, Tenant Isolation, Audit)"
        - "Bot-Infra (Deploy, CI, Observability)"
        - "Bot-QA (Tests and Regression Harnesses)"
        - "Bot-Docs-Janitor (Stale Paths and Handoffs)"
    validations:
      required: true

  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      description: What kind of work is this?
      options:
        - "feature — New functionality"
        - "fix — Bug fix"
        - "audit — Review existing code"
        - "test — Add or improve tests"
        - "docs — Documentation update"
        - "refactor — Code improvement"
    validations:
      required: true

  - type: dropdown
    id: chain
    attributes:
      label: Agent Chain (optional)
      description: Should additional agents review after the primary agent completes?
      options:
        - "None — Single agent only"
        - "Bot-Security review"
        - "Bot-Security then Bot-QA"
        - "Bot-Frontend then Bot-QA"
        - "Bot-Infra then Bot-Security"
        - "Bot-QA validation only"
    validations:
      required: false

  - type: dropdown
    id: production-spine
    attributes:
      label: Production Spine
      description: Which part of the FSMA path is affected?
      options:
        - "ingest"
        - "normalize"
        - "validate"
        - "persist evidence"
        - "export"
        - "admin/operator workflow"
        - "infra/CI only"
        - "docs only"
    validations:
      required: true

  - type: textarea
    id: task-description
    attributes:
      label: Task Description
      description: Detailed description of what the agent should accomplish
      placeholder: |
        Describe the task clearly. Include:
        - What needs to be done
        - Which files/services are affected
        - Any constraints or requirements
        - Expected outcome
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know the task is complete?
      placeholder: |
        - [ ] Feature implemented and working
        - [ ] Tests added with >80% coverage
        - [ ] No security vulnerabilities introduced
        - [ ] Documentation updated
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, links, or references
      placeholder: |
        Related issues, PRs, documentation links, or screenshots
    validations:
      required: false
