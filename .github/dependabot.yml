version: 2

updates:
  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    ignore:
      # Major framework upgrades handled manually via consolidated branches
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  # Python services — security-critical packages get solo PRs (no group entry
  # means Dependabot opens one PR per package). Dev/test tooling is grouped to
  # reduce noise. Everything else is grouped by category while the per-ecosystem
  # open PR limit keeps review volume bounded (#1178).
  #
  # Security-critical (solo PRs): cryptography, pyjwt, python-jose, sqlalchemy,
  # alembic, fastapi, starlette, stripe, httpx, opentelemetry-*

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      root-backend-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - "cryptography"
          - "pyjwt"
          - "python-jose"
          - "sqlalchemy"
          - "alembic"
          - "fastapi"
          - "starlette"
          - "stripe"
          - "httpx"
          - "opentelemetry-*"

  - package-ecosystem: "pip"
    directory: "/services/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      dev-test:
        # Dev/test tooling — low risk, grouped to reduce noise
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "hypothesis"
          - "freezegun"
          - "fakeredis"
      aws:
        # AWS SDK family
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      observability:
        # Non-security observability helpers
        patterns:
          - "sentry-sdk"
          - "structlog"
          - "prometheus-client"
      # Security-critical packages are intentionally NOT listed in any group.
      # Dependabot will open one PR per package for:
      #   cryptography, pyjwt, python-jose, sqlalchemy, alembic,
      #   fastapi, starlette, stripe, httpx, opentelemetry-*

  - package-ecosystem: "pip"
    directory: "/services/ingestion"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      dev-test:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "hypothesis"
          - "freezegun"
          - "fakeredis"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      observability:
        patterns:
          - "sentry-sdk"
          - "structlog"
          - "prometheus-client"

  - package-ecosystem: "pip"
    directory: "/services/compliance"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      dev-test:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "hypothesis"
          - "freezegun"
          - "fakeredis"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      observability:
        patterns:
          - "sentry-sdk"
          - "structlog"
          - "prometheus-client"

  - package-ecosystem: "pip"
    directory: "/services/graph"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      dev-test:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "hypothesis"
          - "freezegun"
          - "fakeredis"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      observability:
        patterns:
          - "sentry-sdk"
          - "structlog"
          - "prometheus-client"
      neo4j:
        patterns:
          - "neo4j"
          - "neo4j-driver"

  - package-ecosystem: "pip"
    directory: "/services/nlp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      dev-test:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "hypothesis"
          - "freezegun"
          - "fakeredis"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      observability:
        patterns:
          - "sentry-sdk"
          - "structlog"
          - "prometheus-client"
      nlp-models:
        # NLP/ML libraries
        patterns:
          - "spacy*"
          - "transformers"
          - "torch"
          - "scikit-learn"

  - package-ecosystem: "pip"
    directory: "/services/scheduler"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      dev-test:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "hypothesis"
          - "freezegun"
          - "fakeredis"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      observability:
        patterns:
          - "sentry-sdk"
          - "structlog"
          - "prometheus-client"

  # GitHub Actions
  # Actions are pinned by SHA in privileged workflows. Keep Dependabot
  # responsible for proposing SHA refreshes instead of relying on mutable tags.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    groups:
      all-actions:
        patterns:
          - "*"
