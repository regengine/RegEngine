version: 2

updates:
  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    ignore:
      # Major framework upgrades handled manually via consolidated branches
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  # Python services — security-critical deps (cryptography, pyjwt, etc.) always
  # get their own standalone PR so they are never buried in a batch. Major bumps
  # for all other deps also get individual PRs. Only minor + patch non-security
  # deps are grouped (#1178).

  - package-ecosystem: "pip"
    directory: "/services/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      security-critical-admin:
        patterns:
          - "cryptography"
          - "pyjwt"
          - "python-jose"
          - "pyotp"
          - "bcrypt"
          - "authlib"
      admin-major:
        update-types:
          - "version-update:semver-major"
        exclude-patterns:
          - "cryptography"
          - "pyjwt"
          - "python-jose"
          - "pyotp"
          - "bcrypt"
          - "authlib"
      admin-minor-patch:
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
        exclude-patterns:
          - "cryptography"
          - "pyjwt"
          - "python-jose"
          - "pyotp"
          - "bcrypt"
          - "authlib"

