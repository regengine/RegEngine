version: 2

updates:
  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    ignore:
      # Major framework upgrades handled manually via consolidated branches
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  # Python services — security/auth/crypto packages are intentionally excluded
  # from the group so each gets its own individual PR (#1178). All remaining
  # patch and minor bumps are batched together to reduce PR noise. Major bumps
  # are always ungrouped (Dependabot default when update-types omits "major").

  - package-ecosystem: "pip"
    directory: "/services/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      patch-and-minor:
        # Exclude security-critical packages so they each get their own PR.
        exclude-patterns:
          - "fastapi"
          - "uvicorn"
          - "cryptography"
          - "pyjwt"
          - "argon2-cffi"
          - "python-jose"
          - "supabase"
          - "authlib"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

  - package-ecosystem: "pip"
    directory: "/services/ingestion"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      patch-and-minor:
        exclude-patterns:
          - "fastapi"
          - "uvicorn"
          - "cryptography"
          - "pyjwt"
          - "argon2-cffi"
          - "python-jose"
          - "supabase"
          - "authlib"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

  - package-ecosystem: "pip"
    directory: "/services/compliance"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      patch-and-minor:
        exclude-patterns:
          - "fastapi"
          - "uvicorn"
          - "cryptography"
          - "pyjwt"
          - "argon2-cffi"
          - "python-jose"
          - "supabase"
          - "authlib"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

  - package-ecosystem: "pip"
    directory: "/services/graph"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      patch-and-minor:
        exclude-patterns:
          - "fastapi"
          - "uvicorn"
          - "cryptography"
          - "pyjwt"
          - "argon2-cffi"
          - "python-jose"
          - "supabase"
          - "authlib"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

  - package-ecosystem: "pip"
    directory: "/services/nlp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      patch-and-minor:
        exclude-patterns:
          - "fastapi"
          - "uvicorn"
          - "cryptography"
          - "pyjwt"
