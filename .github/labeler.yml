# Auto-label PRs based on file paths
# ── Service Labels ────────────────────────────────────────
backend:
  - changed-files:
    - any-glob-to-any-file: 'services/**'

frontend:
  - changed-files:
    - any-glob-to-any-file: 'frontend/**'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

docs:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

security:
  - changed-files:
    - any-glob-to-any-file:
      - '**/security/**'
      - '.github/workflows/security.yml'
      - '.github/workflows/codeql.yml'

database:
  - changed-files:
    - any-glob-to-any-file:
      - '**/migrations/**'
      - '**/models.py'
      - '**/db_session.py'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - '**/requirements.txt'
      - 'requirements.in'
      - 'requirements.lock'
      - '**/package.json'
      - '**/package-lock.json'

# ── Agent Persona Labels ─────────────────────────────────
agent:fsma:
  - changed-files:
    - any-glob-to-any-file:
      - 'services/compliance/**'
      - 'services/graph/app/routers/fsma/**'
      - 'services/graph/app/models/fsma_nodes.py'

agent:pcos:
  - changed-files:
    - any-glob-to-any-file:
      - 'services/admin/app/pcos/**'
      - 'industry_plugins/production_ca_la/**'

agent:security:
  - changed-files:
    - any-glob-to-any-file:
      - 'shared/security/**'
      - 'shared/auth.py'
      - 'shared/middleware/**'

agent:infra:
  - changed-files:
    - any-glob-to-any-file:
      - 'infra/**'
      - 'docker-compose*.yml'
      - 'services/*/Dockerfile'
      - '.github/workflows/**'

agent:ui:
  - changed-files:
    - any-glob-to-any-file:
      - 'frontend/src/components/**'
      - 'frontend/tailwind.config.ts'
      - 'frontend/src/app/globals.css'


# ── Agent Swarm Meta Labels ──────────────────────────────
agent:swarm-config:
  - changed-files:
    - any-glob-to-any-file:
      - '.agent/**'
      - 'scripts/summon_agent.py'
      - 'scripts/swarm_orchestrator.py'
