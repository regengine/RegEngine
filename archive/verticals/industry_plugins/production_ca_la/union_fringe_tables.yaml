# =============================================================================
# CALIFORNIA PAYROLL TAXES (Employer Side)
# =============================================================================

payroll_taxes:
  # Federal Taxes
  FICA_SS:
    name: "Social Security (OASDI)"
    rate_pct: 6.2
    wage_base_limit: 168600  # 2024 limit
    applies_to: "employee"
    notes: "Employer matches employee contribution"
    
  FICA_MED:
    name: "Medicare (HI)"
    rate_pct: 1.45
    wage_base_limit: null  # No limit
    applies_to: "employee"
    notes: "No wage base limit; additional 0.9% on employee side over $200k"
    
  FUTA:
    name: "Federal Unemployment Tax"
    rate_pct: 0.6  # After SUTA credit
    wage_base_limit: 7000
    applies_to: "employee"
    notes: "6% gross rate, 5.4% credit for SUTA compliance"
    
  # California State Taxes
  CA_SUI:
    name: "CA State Unemployment Insurance"
    rate_pct: 3.4  # New employer rate; varies by experience
    wage_base_limit: 7000
    applies_to: "employee"
    notes: "Rate varies 1.5% - 6.2% based on experience rating"
    min_rate: 1.5
    max_rate: 6.2
    
  CA_ETT:
    name: "CA Employment Training Tax"
    rate_pct: 0.1
    wage_base_limit: 7000
    applies_to: "employee"
    notes: "Funds California Employment Training Panel"
    
  CA_SDI:
    name: "CA State Disability Insurance"
    rate_pct: 1.1  # 2024 rate, employee-paid but often employer-covered
    wage_base_limit: 153164  # 2024 limit
    applies_to: "employee"
    notes: "Technically employee-paid; some employers cover it"
    employer_covers: false
    
# =============================================================================
# WORKERS COMPENSATION RATES BY CLASSIFICATION
# California rates per $100 of payroll
# =============================================================================

workers_comp:
  default_rate_per_100: 2.50  # Average for office/clerical
  
  classifications:
    # Entertainment Industry Codes
    MOTION_PICTURE_PRODUCTION:
      code: "9812"
      description: "Motion Picture - Production Staff, Directors, Actors"
      rate_per_100: 2.87
      
    MOTION_PICTURE_TECHNICAL:
      code: "9813"
      description: "Motion Picture - Camera, Lighting, Grip, Electric"
      rate_per_100: 4.92
      
    MOTION_PICTURE_STUNTS:
      code: "9817"
      description: "Motion Picture - Stunt Performers"
      rate_per_100: 28.55
      
    DRIVERS_COMMERCIAL:
      code: "7380"
      description: "Drivers - Commercial"
      rate_per_100: 8.15
      
    CLERICAL_OFFICE:
      code: "8810"
      description: "Clerical Office Employees"
      rate_per_100: 0.35
      
    CONSTRUCTION_CARPENTRY:
      code: "5403"
      description: "Carpentry - Set Construction"
      rate_per_100: 5.62

# =============================================================================
# SUMMARY CALCULATIONS
# =============================================================================

summary:
  # Total employer burden for typical W-2 employee in CA
  statutory_employer_costs:
    fica_ss_pct: 6.2
    fica_med_pct: 1.45
    futa_pct: 0.6
    ca_sui_pct: 3.4  # Average
    ca_ett_pct: 0.1
    total_statutory_pct: 11.75
    
  # Estimate for production worker (IATSE + statutory)
  typical_production_worker:
    union_fringe_pct: 24.719  # IATSE
    statutory_pct: 11.75
    workers_comp_pct: 4.92  # Technical
    total_employer_burden_pct: 41.389
    
  # Estimate for above-the-line (SAG + statutory)
  typical_atl_performer:
    union_fringe_pct: 17.0  # SAG
    statutory_pct: 11.75
    workers_comp_pct: 2.87  # Production
    total_employer_burden_pct: 31.62
