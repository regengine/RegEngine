# Union Rate Tables
# Entertainment industry minimum rates by union and role
# Version: 2026-01 (Effective January 2026)
# Sources: SAG-AFTRA, DGA, WGA, IATSE contracts

version: "2026-01"
effective_date: "2026-01-01"
last_updated: "2026-01-22"

# =============================================================================
# SAG-AFTRA THEATRICAL/TV (Low Budget Tiers)
# =============================================================================
sag_aftra:
  contract_type: "theatrical_tv"
  
  # Low Budget Theatrical (Modified Low Budget < $700K)
  low_budget_modified:
    budget_max: 700000
    rates:
      principal:
        daily: 630
        weekly: 2190
        description: "Principal performer"
      day_player:
        daily: 630
        weekly: 2190
        description: "Day player / Guest star"
      background:
        daily: 216
        hourly: 27
        description: "Background / Extra"
      stand_in:
        daily: 253
        description: "Stand-in"
  
  # Low Budget Theatrical ($700K - $2.5M)
  low_budget:
    budget_min: 700000
    budget_max: 2500000
    rates:
      principal:
        daily: 792
        weekly: 2750
        description: "Principal performer"
      day_player:
        daily: 792
        weekly: 2750
        description: "Day player"
      background:
        daily: 216
        hourly: 27
        description: "Background / Extra"
  
  # Standard Theatrical (> $2.5M)
  standard:
    budget_min: 2500000
    rates:
      principal:
        daily: 1082
        weekly: 3756
        description: "Principal performer"
      day_player:
        daily: 1082
        weekly: 3756
        description: "Day player"
      background:
        daily: 216
        hourly: 27
        description: "Background / Extra"
  
  # Fringes
  fringes:
    pension_health: 19.1
    vacation: 1.0
    total: 20.1

