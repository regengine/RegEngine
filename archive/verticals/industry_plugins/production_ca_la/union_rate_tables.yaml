  # Low Budget (< $11M)
  low_budget:
    budget_max: 11000000
    rates:
      director_theatrical:
        weekly: 19143
        guarantee_weeks: 13
        description: "Director - feature film"
      first_ad:
        weekly: 5847
        description: "1st Assistant Director"
      second_ad:
        weekly: 4204
        description: "2nd Assistant Director"
      upm:
        weekly: 5847
        description: "Unit Production Manager"
  
