# Finance AI Governance Vertical - Configuration
# ==============================================
# This file defines the metadata and contracts for the Finance vertical

name: finance
version: 1.0.0

# Regulatory Agencies
regulators:
  - OCC    # Office of the Comptroller of the Currency
  - CFPB   # Consumer Financial Protection Bureau
  - FRB    # Federal Reserve Board
  - FDIC   # Federal Deposit Insurance Corporation
  - NCUA   # National Credit Union Administration

# Regulatory Domains
regulatory_domains:
  - ECOA       # Equal Credit Opportunity Act (Reg B)
  - TILA       # Truth in Lending Act (Reg Z)
  - FCRA       # Fair Credit Reporting Act
  - UDAAP      # Unfair, Deceptive, or Abusive Acts or Practices
  - SR_11_7    # Model Risk Management Guidance
  - OCC_AI     # OCC Artificial Intelligence Guidance

# Decision Types
decision_types:
  - credit_approval
  - credit_denial
  - limit_adjustment
  - fraud_flag
  - account_closure

# Risk Dimensions
risk_dimensions:
  - bias_risk
  - drift_risk
  - documentation_risk
  - regulatory_mapping_risk
  - model_governance_risk

# Evidence Contract
# Required evidence fields per decision type
evidence_contract:
  credit_approval:
    required:
      - customer_id
      - model_version
      - credit_score
      - approval_amount
      - interest_rate
      - application_timestamp
      
  credit_denial:
    required:
      - customer_id
      - model_version
      - reason_codes
      - adverse_action_notice
      - notice_delivery_timestamp
      - denial_timestamp
      
  limit_adjustment:
    required:
      - customer_id
      - model_version
      - previous_limit
      - new_limit
      - adjustment_reason
      - effective_date
      
  fraud_flag:
    required:
      - transaction_id
      - customer_id
      - model_version
      - fraud_score
      - fraud_indicators
      - review_status
      
  account_closure:
    required:
      - customer_id
      - closure_reason
      - notification_sent
      - closure_timestamp

# Snapshot Contract
# Defines the signature of snapshot computation function
snapshot_contract:
  function: compute_compliance_snapshot
  inputs:
    - decisions
    - models
    - bias_reports
    - drift_events
    - obligation_evaluations
  outputs:
    - bias_score
    - drift_score
    - documentation_score
    - regulatory_mapping_score
    - obligation_coverage_percent
    - total_compliance_score

# Scoring Weights
# Must sum to 1.0
scoring_weights:
  bias: 0.30              # 30% weight on bias detection
  drift: 0.20             # 20% weight on model drift
  documentation: 0.25     # 25% weight on documentation completeness
  regulatory_mapping: 0.25 # 25% weight on obligation coverage
