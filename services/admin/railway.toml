[build]
builder = "DOCKERFILE"
dockerfilePath = "./services/admin/Dockerfile"
watchPatterns = ["services/admin/**", "services/shared/**"]

[deploy]
startCommand = "bash /app/scripts/run-migrations.sh && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
