# Production Docker Compose — RegEngine on Railway + Supabase
#
# NOTE: Production runs on Vercel (frontend) + Railway (backend) + Supabase (database).
# This file is provided for self-hosted or on-prem deployments.
# It does NOT include Neo4j, Kafka, or Redis — those are legacy services
# from the original distributed design and are not in the production critical path.
#
# For the full local dev stack (including legacy services), use docker-compose.yml.

x-env-prod: &env_prod
  REGENGINE_ENV: production
  DATABASE_URL: ${DATABASE_URL:?error}
  ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:?error}
  LOG_LEVEL: ${LOG_LEVEL:-WARNING}
  ENABLE_DB_API_KEYS: "true"

x-deploy-defaults: &deploy_defaults
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3

services:
  admin-api:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    image: ghcr.io/regengine/admin-api:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    environment:
      <<: *env_prod
      ADMIN_MASTER_KEY: ${ADMIN_MASTER_KEY:?error}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8400/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      <<: *deploy_defaults
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  ingestion-service:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    image: ghcr.io/regengine/ingestion-service:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    environment:
      <<: *env_prod
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      <<: *deploy_defaults
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  compliance-api:
    build:
      context: .
      dockerfile: ./services/compliance/Dockerfile
    image: ghcr.io/regengine/compliance-api:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    environment:
      <<: *env_prod
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8500/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      <<: *deploy_defaults
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  graph-service:
    build:
      context: .
      dockerfile: ./services/graph/Dockerfile
    image: ghcr.io/regengine/graph-service:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    environment:
      <<: *env_prod
      DATABASE_URL: ${GRAPH_DATABASE_URL:?GRAPH_DATABASE_URL must be set}
      NEO4J_URI: ${NEO4J_URI:?NEO4J_URI must be set}
      NEO4J_USER: ${NEO4J_USER:?NEO4J_USER must be set}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8200/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      <<: *deploy_defaults
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  nlp-service:
    build:
      context: .
      dockerfile: ./services/nlp/Dockerfile
    image: ghcr.io/regengine/nlp-service:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    environment:
      <<: *env_prod
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?KAFKA_BOOTSTRAP_SERVERS must be set}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      <<: *deploy_defaults
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  scheduler:
    build:
      context: .
      dockerfile: ./services/scheduler/Dockerfile
    image: ghcr.io/regengine/scheduler:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    environment:
      <<: *env_prod
      SCHEDULER_API_KEY: ${SCHEDULER_API_KEY:?SCHEDULER_API_KEY must be set}
      INGESTION_SERVICE_URL: ${INGESTION_SERVICE_URL:?INGESTION_SERVICE_URL must be set}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?KAFKA_BOOTSTRAP_SERVERS must be set}
      REDIS_URL: ${REDIS_URL:?REDIS_URL must be set}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8600/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      <<: *deploy_defaults
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
