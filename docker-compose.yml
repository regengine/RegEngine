# SEC-004: Required secrets MUST be set via environment or .env file
# Do NOT use default values for sensitive credentials in production
# Run ./scripts/check_required_secrets.sh to validate before starting

x-env-common:
  # B4: Centralized path resolution (Sprint 11)
  &env_common
  PROJECT_ROOT: /app
  RAW_DATA_BUCKET: ${RAW_DATA_BUCKET:-reg-engine-raw-data-dev}
  PROCESSED_DATA_BUCKET: ${PROCESSED_DATA_BUCKET:-reg-engine-processed-data-dev}
  OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?OBJECT_STORAGE_ACCESS_KEY_ID must be set}
  OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?OBJECT_STORAGE_SECRET_ACCESS_KEY must be set}
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
  OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-http://minio:9000}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
  KAFKA_TOPIC_NORMALIZED: ${KAFKA_TOPIC_NORMALIZED:-ingest.normalized.v2}
  KAFKA_TOPIC_NLP: ${KAFKA_TOPIC_NLP:-nlp.extracted}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set - do not use default values}
  DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine}
  ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine_admin}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
  ENABLE_DB_API_KEYS: "true"
  # Per-tenant rate limiting (Sprint 13)
  RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/minute}
  RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-redis://redis:6379/2}
  # SECURITY: Auth test bypass — empty default means bypass is disabled.
  # Never set a value in production. Runtime enforcement in services/shared/auth.py
  # blocks bypass when REGENGINE_ENV=production regardless of this value.
  AUTH_TEST_BYPASS_TOKEN: ${AUTH_TEST_BYPASS_TOKEN:-}
  AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?AUTH_SECRET_KEY must be set}
  ENABLE_OTEL: ${ENABLE_OTEL:-true}
  # Runtime mode — defaults to "development" for docker-compose (local dev).
  # In production deployments, set to "production" to disable auth bypass.
  REGENGINE_ENV: ${REGENGINE_ENV:-development}
  GRAPH_SERVICE_URL: ${GRAPH_SERVICE_URL:-http://graph-service:8200}

services:
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-api
      - ingestion-service

  scheduler:
    build:
      context: .
      dockerfile: ./services/scheduler/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      INGESTION_SERVICE_URL: http://ingestion-service:8000
      SCHEDULER_API_KEY: ${SCHEDULER_API_KEY:?SCHEDULER_API_KEY must be set}
      WEBHOOK_URLS: ${WEBHOOK_URLS:-}
      FDA_WARNING_LETTERS_INTERVAL: ${FDA_WARNING_LETTERS_INTERVAL:-60}
      FDA_IMPORT_ALERTS_INTERVAL: ${FDA_IMPORT_ALERTS_INTERVAL:-120}
      FDA_RECALLS_INTERVAL: ${FDA_RECALLS_INTERVAL:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8600/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8600:8600"

  admin-api:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    restart: unless-stopped
    ports:
      - "8400:8400"
    environment:
      <<: *env_common
      LOG_LEVEL: INFO
      ADMIN_MASTER_KEY: ${ADMIN_MASTER_KEY:?ADMIN_MASTER_KEY must be set - do not use default values}
      REGENGINE_ENV: ${REGENGINE_ENV:-development}
      # Override DATABASE_URL to use the async admin database
      DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine_admin}
      # PCOS payroll database (shares regengine_admin schema)
      ENTERTAINMENT_DATABASE_URL: ${ENTERTAINMENT_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine_admin}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8400/health" ]
      interval: 10s
      timeout: 3s
      retries: 10


  ingestion-service:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      <<: *env_common
      # Override DATABASE_URL to use the async driver (required by shared.api_key_store)
      DATABASE_URL: ${INGESTION_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine_admin}
      # Admin DB connection for cross-service audit log queries
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+psycopg://regengine:regengine@postgres:5432/regengine_admin}
      # CORS origins for frontend access (comma-separated)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./services/ingestion/app:/app/app
      - ./services/ingestion/main.py:/app/main.py
      - ./services/shared:/app/shared
      - ./kernel:/app/kernel
      - ./plugins:/app/plugins
      - ./services/ingestion/tests:/app/tests
      - ./migrations:/migrations

  compliance-api:
    build:
      context: .
      dockerfile: ./services/compliance/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8500/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "8500:8500"

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics
    depends_on:
      - jaeger


  nlp-service:
    build:
      context: .
      dockerfile: ./services/nlp/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
    volumes:
      - ./services/nlp/app:/app/services/nlp/app
      - ./services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "8100:8100"

  graph-service:
    build:
      context: .
      dockerfile: ./services/graph/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
      # Override for async API key store (requires asyncpg driver)
      DATABASE_URL: ${GRAPH_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine_admin}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      neo4j:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8200/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./services/graph/app:/app/app
      - ./services/graph/main.py:/app/main.py
      - ./services/shared:/app/shared
    ports:
      - "8200:8200"


  compliance-worker:
    build:
      context: .
      dockerfile: ./kernel/reporting/worker.Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
      # Worker needs schema registry URL explicit if not in common
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_DIR: /app/schemas
      # Connect to Admin DB where tables reside
      DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-regengine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/regengine_admin}
    depends_on:
      - redpanda
      - schema-registry
      - postgres
      - compliance-api
    volumes:
      - ./schemas:/app/schemas

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    restart: unless-stopped
    environment:
      # WARNING: Fallback values are dev-only defaults. Override via .env in production.
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin123}}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.10
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "health" ]
      interval: 15s
      timeout: 10s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    restart: unless-stopped
    depends_on:
      - redpanda
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"

  neo4j:
    image: neo4j:5.24-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      NEO4J_dbms_default__listen__address: "0.0.0.0"
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      # WARNING: Fallback user/db are dev-only defaults. Override via .env in production.
      POSTGRES_USER: ${POSTGRES_USER:-regengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-regengine}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
      # Database migrations are managed by Alembic (see alembic/ directory).
      # For new databases:  alembic upgrade head
      # For existing databases (already have V002-V042 tables): alembic stamp head
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U regengine" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
    depends_on:
      - redpanda

  # ---------------------------------------------------------------------------
  # Monitoring (activate with: docker compose --profile monitoring up -d)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.2.2
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.7.0
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      - DATA_SOURCE_NAME=postgresql://regengine:${POSTGRES_PASSWORD:-regengine}@postgres:5432/regengine?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
