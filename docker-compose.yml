# SEC-004: Required secrets MUST be set via environment or .env file
# Do NOT use default values for sensitive credentials in production
# Run ./scripts/check_required_secrets.sh to validate before starting

x-env-common:
  # B4: Centralized path resolution (Sprint 11)
  &env_common
  PROJECT_ROOT: /code
  RAW_DATA_BUCKET: ${RAW_DATA_BUCKET:-reg-engine-raw-data-dev}
  PROCESSED_DATA_BUCKET: ${PROCESSED_DATA_BUCKET:-reg-engine-processed-data-dev}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID must be set}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY must be set}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
  KAFKA_TOPIC_NORMALIZED: ${KAFKA_TOPIC_NORMALIZED:-ingest.normalized.v2}
  KAFKA_TOPIC_NLP: ${KAFKA_TOPIC_NLP:-nlp.extracted}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set - do not use default values}
  DATABASE_URL: ${DATABASE_URL:-postgresql://regengine:regengine@postgres:5432/regengine}
  ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+psycopg://regengine:regengine@postgres:5432/regengine_admin}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
  ENABLE_DB_API_KEYS: "true"
  # Per-tenant rate limiting (Sprint 13)
  RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/minute}
  RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-redis://redis:6379/2}
  # Test API key bypass - allows 'admin' as a valid key for development
  AUTH_TEST_BYPASS_TOKEN: ${AUTH_TEST_BYPASS_TOKEN:-admin}
  AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}

services:
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-api
      - ingestion-service

  scheduler:
    build:
      context: ./services/scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://regengine:regengine@postgres:5432/regengine}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      INGESTION_SERVICE_URL: http://ingestion-service:8000
      SCHEDULER_API_KEY: ${ADMIN_MASTER_KEY}
      WEBHOOK_URLS: ${WEBHOOK_URLS:-}
      FDA_WARNING_LETTERS_INTERVAL: ${FDA_WARNING_LETTERS_INTERVAL:-60}
      FDA_IMPORT_ALERTS_INTERVAL: ${FDA_IMPORT_ALERTS_INTERVAL:-120}
      FDA_RECALLS_INTERVAL: ${FDA_RECALLS_INTERVAL:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
      ingestion-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8600/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8600:8600"

  admin-api:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    restart: unless-stopped
    ports:
      - "8400:8400"
    environment:
      <<: *env_common
      LOG_LEVEL: INFO
      ADMIN_MASTER_KEY: ${ADMIN_MASTER_KEY:?ADMIN_MASTER_KEY must be set - do not use default values}
      REGENGINE_ENV: ${REGENGINE_ENV:-development}
      # Override DATABASE_URL to use the async admin database
      DATABASE_URL: ${ADMIN_DATABASE_URL:-postgresql+psycopg://regengine:regengine@postgres:5432/regengine_admin}
      # Entertainment DB for PCOS vertical (migrated Jan 31, 2026)
      # Pointing to regengine_admin for now as migration applied there
      ENTERTAINMENT_DATABASE_URL: ${ENTERTAINMENT_DATABASE_URL:-postgresql+psycopg://regengine:regengine@postgres:5432/regengine_admin}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8400/health" ]
      interval: 10s
      timeout: 3s
      retries: 10

  # finance-api: REMOVED — services/finance_api/ directory does not exist.
  # Re-add when the Finance service is implemented.


  ingestion-service:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      <<: *env_common
      # Override DATABASE_URL to use the async driver (required by shared.api_key_store)
      DATABASE_URL: postgresql+psycopg://regengine:regengine@postgres:5432/regengine_admin
      # CORS origins for frontend access (comma-separated)
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080"
    volumes:
      - ./services/ingestion/app:/app/app
      - ./services/ingestion/main.py:/app/main.py
      - ./services/shared:/app/shared
      - ./kernel:/app/kernel
      - ./plugins:/app/plugins

  compliance-api:
    build:
      context: .
      dockerfile: ./services/compliance/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - admin-api
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8500/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "8500:8500"

  energy-api:
    build:
      context: .
      dockerfile: services/energy/Dockerfile
    restart: unless-stopped
    ports:
      - "8700:8700"
    environment:
      DATABASE_URL: "postgresql://regengine:regengine@postgres:5432/energy"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # L-1: Non-standard HEALTHCHECK intervals (10s/30s vs 30s/5s) are intentional -
    # energy service loads ML models at startup requiring a longer start_period.
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8700/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # volumes:
    #   - ./services/energy/app:/app/app # Hot reload in dev - TEMPORARILY DISABLED for Phase 0 verification
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  opportunity-api:
    build:
      context: .
      dockerfile: ./services/opportunity/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      neo4j:
        condition: service_healthy
      admin-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8300/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s
    ports:
      - "8300:8300"

  billing-service:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      BILLING_PORT: "8800"
      BILLING_ENV: ${BILLING_ENV:-sandbox}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,https://regengine.co,https://regengine.vercel.app"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics
    depends_on:
      - jaeger

