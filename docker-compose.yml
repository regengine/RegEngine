    ports:
      - "8300:8300"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
      redpanda:
        condition: service_started
      admin-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 3s
      retries: 10

  nlp-service:
    build:
      context: .
      dockerfile: ./services/nlp/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
    volumes:
      - ./services/nlp/app:/app/services/nlp/app
      - ./services/shared:/app/services/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
      redpanda:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "8100:8100"

  graph-service:
    build:
      context: .
      dockerfile: ./services/graph/Dockerfile
    restart: unless-stopped
    environment:
      <<: *env_common
      # Override for async API key store (requires asyncpg driver)
      DATABASE_URL: postgresql+asyncpg://regengine:regengine@postgres:5432/regengine_admin
      AUTH_TEST_BYPASS_TOKEN: dev-bypass-token
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
