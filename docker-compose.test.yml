# Compose stack for local integration tests.
# Mirrors the service containers from backend-ci.yml so tests behave
# identically to CI when run via:
#   docker compose -f docker-compose.test.yml up -d
#   pytest services/<svc>/tests/ -v

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Create the same databases backend-ci.yml creates
    volumes:
      - ./scripts/test/init-test-dbs.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/test-password-for-ci
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/test_db
      ADMIN_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/regengine_admin
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: test-secret-key-for-ci
      ADMIN_MASTER_KEY: test-master-key-for-ci
      REGENGINE_API_KEY: test-api-key-for-ci
      REGENGINE_ENV: test
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test-password-for-ci
      OBJECT_STORAGE_ACCESS_KEY_ID: ci-test-key
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-test-secret
      OBJECT_STORAGE_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8400:8400"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8400/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
